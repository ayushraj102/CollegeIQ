<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CampusIQ — Teacher Portal</title>
<script src="theme.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="theme.css">
</head>
<body>
<div id="toast-wrap"></div>
<div class="app-shell">
  <header class="topbar">
    <div class="tb-brand"><div class="tb-brand-icon">IQ</div>Campus<em style="color:var(--cyan);font-style:normal;font-family:var(--font-h)">IQ</em></div>
    <div class="tb-right">
      <span class="tb-badge badge-teacher">Teacher</span>
      <div class="notif-bell" id="notifBtn" title="Notifications"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span class="notif-dot" id="nDot" style="display:none"></span></div>
      <div class="tb-user"><div class="avatar av-sm" id="tbAvatar" style="background:linear-gradient(135deg,#8B5CF6,#EC4899)"></div><span id="tbName"></span></div>
      <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle light/dark"></button>
      <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </div>
  </header>
  <aside class="sidebar">
    <div class="sb-section">Teaching</div>
    <div class="sb-item active" data-page="overview"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</div>
    <div class="sb-item" data-page="students"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>My Students</div>
    <div class="sb-item" data-page="grades"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Add / Edit Grades</div>
    <div class="sb-section">Verification</div>
    <div class="sb-item" data-page="verify"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Verify Achievements <span class="sb-badge amber" id="vBadge" style="display:none">0</span></div>
    <div class="sb-section">Research</div>
    <div class="sb-item" data-page="research"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>My Research</div>
    <div class="sb-item" data-page="analytics"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Student Analytics</div>
  </aside>
  <main class="main-area" id="mainArea"></main>
</div>

<!-- GRADE MODAL -->
<div class="modal-overlay" id="gradeModal">
  <div class="modal-box">
    <div class="modal-hdr"><span class="modal-title" id="gradeMTitle">📝 Add Grade Record</span><button class="modal-close" id="closeGradeBtn">✕</button></div>
    <input type="hidden" id="gEditId">
    <div class="form-row-2">
      <div class="form-group"><label>Student *</label><select class="form-control" id="gStudent"></select></div>
      <div class="form-group"><label>Subject *</label><input class="form-control" id="gSubject" placeholder="e.g. Data Structures"></div>
    </div>
    <div class="form-row-2">
      <div class="form-group"><label>Semester *</label><input class="form-control" id="gSemester" placeholder="e.g. Sem 5"></div>
      <div class="form-group"><label>Marks (%) *</label><input class="form-control" type="number" id="gMarks" min="0" max="100"></div>
    </div>
    <div class="form-row-3">
      <div class="form-group"><label>Quiz (%)</label><input class="form-control" type="number" id="gQuiz" min="0" max="100"></div>
      <div class="form-group"><label>Assignment (%)</label><input class="form-control" type="number" id="gAssign" min="0" max="100"></div>
      <div class="form-group"><label>Attendance (%) *</label><input class="form-control" type="number" id="gAtt" min="0" max="100"></div>
    </div>
    <div class="form-group"><label>Feedback</label><textarea class="form-control" id="gFeedback" rows="2" placeholder="Optional feedback for student"></textarea></div>
    <button class="btn btn-primary w-full" id="saveGradeBtn">Save Record</button>
  </div>
</div>

<!-- RESEARCH MODAL -->
<div class="modal-overlay" id="researchModal">
  <div class="modal-box">
    <div class="modal-hdr"><span class="modal-title" id="resMTitle">📄 Add Publication</span><button class="modal-close" id="closeResBtn">✕</button></div>
    <input type="hidden" id="rEditId">
    <div class="form-group"><label>Title *</label><input class="form-control" id="rTitle" placeholder="Publication title"></div>
    <div class="form-row-2">
      <div class="form-group"><label>Journal / Conference *</label><input class="form-control" id="rJournal" placeholder="e.g. IEEE IoT Journal"></div>
      <div class="form-group"><label>Year</label><input class="form-control" type="number" id="rYear" min="2000" max="2030"></div>
    </div>
    <div class="form-row-2">
      <div class="form-group"><label>DOI</label><input class="form-control" id="rDoi" placeholder="10.1234/xxx"></div>
      <div class="form-group"><label>Status</label>
        <select class="form-control" id="rStatus">
          <option value="under_review">Under Review</option>
          <option value="published">Published</option>
          <option value="preprint">Preprint</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Co-Authors (comma-separated)</label><input class="form-control" id="rCoAuth" placeholder="e.g. Prof. Singh, Dr. Mehta"></div>
    <div class="form-group"><label>Abstract</label><textarea class="form-control" id="rAbstract" rows="2" placeholder="Brief abstract…"></textarea></div>
    <button class="btn btn-primary w-full" id="saveResBtn">Save Publication</button>
  </div>
</div>

<script src="data.js"></script>
<script src="utils.js"></script>
<script>
'use strict';
seedIfEmpty();
const session = Auth.guard('teacher');
const teacher = DB.getTeacherByUserId(session.userId);
if (!teacher) Auth.logout();

initTopbar(session);
document.getElementById('logoutBtn').addEventListener('click', () => Auth.logout());

// ── Notifications ─────────────────────────────────────────
function refreshNotifDot() {
  const u = DB.getNotifications(session.userId).filter(n=>!n.read).length;
  document.getElementById('nDot').style.display = u ? 'block' : 'none';
}
document.getElementById('notifBtn').addEventListener('click', () => {
  DB.markNotifsRead(session.userId); refreshNotifDot(); showToast('All notifications read','','info');
});

// ── Verify badge ──────────────────────────────────────────
function refreshVBadge() {
  const n = DB.getAchievements().filter(a=>a.status==='pending').length;
  const b = document.getElementById('vBadge');
  b.style.display = n ? 'flex' : 'none';
  if (n) b.textContent = n;
}

// ── Navigation ────────────────────────────────────────────
const PAGES = { overview:renderOverview, students:renderStudents, grades:renderGrades, verify:renderVerify, research:renderResearch, analytics:renderAnalytics };
function renderPage(p) { showLoading('mainArea'); setTimeout(()=>(PAGES[p]||renderOverview)(), 80); }
setupNav(renderPage);

// ═══════════════════════════════════════════════════════
// OVERVIEW
// ═══════════════════════════════════════════════════════
function renderOverview() {
  const students = DB.getStudents();
  const achievs  = DB.getAchievements();
  const acRecs   = DB.getAcademic();
  const pending  = achievs.filter(a=>a.status==='pending').length;
  const myRes    = DB.getResearchByTeacher(teacher.id);

  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in">
    <div class="page-hdr-left"><h2>Dashboard</h2><p>Welcome, ${esc(session.name.split(' ').slice(0,2).join(' '))}!</p></div>
  </div>
  <div class="grid-4 animate-in anim-delay-1">
    ${[
      ['Total Students', students.length, 'var(--cyan)', '🎓'],
      ['Pending Verify', pending, 'var(--amber)', '🔍'],
      ['Grade Records', acRecs.length, 'var(--violet)', '📋'],
      ['My Publications', myRes.filter(r=>r.status==='published').length, 'var(--emerald)', '📄'],
    ].map(([l,v,c,i])=>`<div class="stat-card"><div class="stat-icon" style="background:${c}22">${i}</div><div class="stat-label">${l}</div><div class="stat-val" style="color:${c}">${v}</div></div>`).join('')}
  </div>
  ${pending ? `
  <div class="card mt-2 animate-in anim-delay-2" style="border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.03)">
    <div class="card-title" style="color:var(--amber)">🔔 ${pending} achievement${pending>1?'s':''} awaiting your verification</div>
    <button class="btn btn-amber btn-sm" id="goVerifyBtn">Review Now →</button>
  </div>` : ''}
  <div class="grid-2 mt-2 animate-in anim-delay-3">
    <div class="card">
      <div class="card-title">📊 Student Readiness Overview</div>
      ${students.slice(0,8).map(st=>{
        const r=DB.calcReadiness(st.id);
        return `<div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.5rem">
          <div class="avatar av-sm" style="background:${grad(st.id.charCodeAt(1)||0)};flex-shrink:0">${getInitials(st.name)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:0.78rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(st.name)}</div>
            ${progressBar(r, 100)}
          </div>
          <span style="font-weight:700;font-size:0.78rem;color:${readinessColor(r)};flex-shrink:0">${r}</span>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="card-title">🏆 Recent Verifications</div>
      ${achievs.filter(a=>a.verifiedBy===teacher.id&&a.status==='verified').slice(-6).reverse().map(a=>{
        const st=DB.getStudentById(a.studentId);
        return `<div style="padding:0.45rem 0;border-bottom:1px solid var(--b3)">
          <div style="font-size:0.78rem;font-weight:600;color:var(--text)">${esc(a.title)}</div>
          <div class="text-xs text-muted">${esc(st?.name||'Unknown')} · ${a.verifiedAt?.slice(0,10)||'—'}</div>
        </div>`;
      }).join('')||'<div class="text-xs text-muted">No verifications yet</div>'}
    </div>
  </div>`;

  animateBars();
  document.getElementById('goVerifyBtn')?.addEventListener('click', ()=>{
    document.querySelector('[data-page="verify"]').click();
  });
}

// ═══════════════════════════════════════════════════════
// MY STUDENTS
// ═══════════════════════════════════════════════════════
function renderStudents() {
  const students = DB.getStudents();
  const achievs  = DB.getAchievements();
  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>My Students (${students.length})</h2></div></div>
  <div class="card animate-in anim-delay-1">
    <div class="tbl-wrap"><table>
      <thead><tr><th>Name</th><th>Dept/Year</th><th>GPA</th><th>Readiness</th><th>Verified Achs</th><th>Risk</th><th>Action</th></tr></thead>
      <tbody>${students.map(st=>{
        const r   = DB.calcReadiness(st.id);
        const achv= achievs.filter(a=>a.studentId===st.id&&a.status==='verified').length;
        const risk= DB.getRiskLevel(st.id);
        return `<tr>
          <td><strong>${esc(st.name)}</strong><br><span class="text-xs text-muted">${esc(st.rollNo)}</span></td>
          <td class="text-xs">${esc(st.dept)} · Y${st.year} ${esc(st.section)}</td>
          <td style="color:var(--cyan);font-weight:600">${st.gpa}</td>
          <td><span style="font-weight:700;color:${readinessColor(r)}">${r}/100</span></td>
          <td><span class="chip chip-emerald">${achv}</span></td>
          <td>${riskChip(risk)}</td>
          <td><button class="btn btn-xs btn-primary view-st" data-id="${esc(st.id)}">Details</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;

  document.querySelectorAll('.view-st').forEach(btn => {
    btn.addEventListener('click', () => showStudentDetails(btn.dataset.id));
  });
}

function showStudentDetails(sid) {
  const st   = DB.getStudentById(sid);
  if (!st) return;
  const acRecs  = DB.getStudentAcademic(sid);
  const achievs = DB.getAchievementsByStudent(sid);
  const weak    = DB.getWeakAreas(sid);
  const r       = DB.calcReadiness(sid);

  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in">
    <div class="page-hdr-left"><h2>${esc(st.name)}</h2><p>${esc(st.dept)} · Year ${st.year} · ${esc(st.rollNo)}</p></div>
    <div class="page-actions">
      <button class="btn btn-secondary" id="backToStudents">← Back</button>
      <button class="btn btn-primary" id="addGradeForSt">+ Add Grade</button>
    </div>
  </div>
  <div class="grid-3 animate-in anim-delay-1">
    <div class="stat-card"><div class="stat-label">Readiness</div><div class="stat-val" style="color:${readinessColor(r)}">${r}/100</div></div>
    <div class="stat-card"><div class="stat-label">GPA</div><div class="stat-val" style="color:var(--cyan)">${st.gpa}</div></div>
    <div class="stat-card"><div class="stat-label">Verified Achievements</div><div class="stat-val" style="color:var(--violet)">${achievs.filter(a=>a.status==='verified').length}</div></div>
  </div>
  ${weak.length?`<div class="card mt-2 animate-in anim-delay-2" style="border-color:rgba(239,68,68,0.25)">
    <div class="card-title" style="color:var(--red)">⚠ Weak Areas</div>
    ${weak.map(w=>`<div style="padding:0.4rem 0;border-bottom:1px solid var(--b3)"><span style="color:var(--text2)">${esc(w.subject)}</span> — <strong style="color:${w.severity==='high'?'var(--red)':'var(--amber)'}">${w.type} ${w.value}%</strong> (target: ${w.threshold}%+)</div>`).join('')}
  </div>`:''}
  ${acRecs.length?`<div class="card mt-2 animate-in anim-delay-2">
    <div class="card-title">📚 Academic Records</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Subject</th><th>Sem</th><th>Marks</th><th>Attendance</th><th>Feedback</th><th>Action</th></tr></thead>
      <tbody>${acRecs.map(r=>`<tr>
        <td><strong>${esc(r.subject)}</strong></td>
        <td class="text-xs">${esc(r.semester)}</td>
        <td style="color:${r.marks>=75?'var(--emerald)':r.marks>=60?'var(--cyan)':'var(--red)'};font-weight:600">${r.marks}%</td>
        <td style="color:${r.attendance>=75?'var(--emerald)':'var(--red)'};font-weight:600">${r.attendance}%</td>
        <td class="text-xs" style="color:var(--text2)">${esc(r.feedback||'—')}</td>
        <td style="display:flex;gap:0.3rem">
          <button class="btn btn-xs btn-secondary edit-grade" data-id="${esc(r.id)}">Edit</button>
          <button class="btn btn-xs btn-danger del-grade" data-id="${esc(r.id)}">Del</button>
        </td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>`:''}`;

  document.getElementById('backToStudents').addEventListener('click', () => renderStudents());
  document.getElementById('addGradeForSt').addEventListener('click', () => openGradeModal(null, sid));
  document.querySelectorAll('.edit-grade').forEach(b => b.addEventListener('click', () => openGradeModal(b.dataset.id)));
  document.querySelectorAll('.del-grade').forEach(b => b.addEventListener('click', () => {
    if (!confirm('Delete this grade record?')) return;
    DB.deleteAcademic(b.dataset.id); showToast('Record deleted'); showStudentDetails(sid);
  }));
}

// ═══════════════════════════════════════════════════════
// GRADES
// ═══════════════════════════════════════════════════════
setupModal('gradeModal', 'closeGradeBtn');

function renderGrades() {
  const acRecs  = DB.getAcademic();
  const students = DB.getStudents();
  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in">
    <div class="page-hdr-left"><h2>Grade Records (${acRecs.length})</h2></div>
    <div class="page-actions"><button class="btn btn-primary" id="addGradeBtn">+ Add Record</button></div>
  </div>
  <div class="card animate-in anim-delay-1">
    <div class="tbl-wrap"><table>
      <thead><tr><th>Student</th><th>Subject</th><th>Semester</th><th>Marks</th><th>Attendance</th><th>Actions</th></tr></thead>
      <tbody>${acRecs.map(r=>{
        const st=students.find(s=>s.id===r.studentId);
        return `<tr>
          <td><strong>${esc(st?.name||'Unknown')}</strong></td>
          <td>${esc(r.subject)}</td>
          <td class="text-xs">${esc(r.semester||'—')}</td>
          <td style="color:${r.marks>=75?'var(--emerald)':r.marks>=60?'var(--cyan)':'var(--red)'};font-weight:600">${r.marks}%</td>
          <td style="color:${r.attendance>=75?'var(--emerald)':'var(--red)'};font-weight:600">${r.attendance}%</td>
          <td style="display:flex;gap:0.3rem">
            <button class="btn btn-xs btn-secondary edit-grade" data-id="${esc(r.id)}">Edit</button>
            <button class="btn btn-xs btn-danger del-grade" data-id="${esc(r.id)}">Del</button>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;

  document.getElementById('addGradeBtn').addEventListener('click', () => openGradeModal(null));
  document.querySelectorAll('.edit-grade').forEach(b => b.addEventListener('click', () => openGradeModal(b.dataset.id)));
  document.querySelectorAll('.del-grade').forEach(b => b.addEventListener('click', () => {
    if (!confirm('Delete this record?')) return;
    DB.deleteAcademic(b.dataset.id); showToast('Deleted'); renderGrades();
  }));
}

function openGradeModal(editId = null, preselectedStudentId = null) {
  // Populate student dropdown
  const sel = document.getElementById('gStudent');
  sel.innerHTML = DB.getStudents().map(s=>`<option value="${esc(s.id)}" ${preselectedStudentId===s.id?'selected':''}>${esc(s.name)} (${esc(s.rollNo)})</option>`).join('');

  const btn = document.getElementById('saveGradeBtn');
  document.getElementById('gEditId').value = editId || '';

  if (editId) {
    const rec = DB.getAcademicById(editId);
    if (rec) {
      document.getElementById('gradeMTitle').textContent = '✏️ Edit Grade Record';
      sel.value = rec.studentId;
      document.getElementById('gSubject').value  = rec.subject;
      document.getElementById('gSemester').value = rec.semester;
      document.getElementById('gMarks').value    = rec.marks;
      document.getElementById('gQuiz').value     = rec.quiz || '';
      document.getElementById('gAssign').value   = rec.assignment || '';
      document.getElementById('gAtt').value      = rec.attendance;
      document.getElementById('gFeedback').value = rec.feedback || '';
    }
  } else {
    document.getElementById('gradeMTitle').textContent = '📝 Add Grade Record';
    ['gSubject','gSemester','gMarks','gQuiz','gAssign','gAtt','gFeedback'].forEach(id => document.getElementById(id).value = '');
  }
  openModal('gradeModal');
}

document.getElementById('saveGradeBtn').addEventListener('click', async () => {
  const btn = document.getElementById('saveGradeBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const editId = document.getElementById('gEditId').value;
    const data = {
      studentId:  document.getElementById('gStudent').value,
      teacherId:  teacher.id,
      subject:    document.getElementById('gSubject').value,
      semester:   document.getElementById('gSemester').value,
      marks:      document.getElementById('gMarks').value,
      quiz:       document.getElementById('gQuiz').value || 0,
      assignment: document.getElementById('gAssign').value || 0,
      attendance: document.getElementById('gAtt').value,
      feedback:   document.getElementById('gFeedback').value,
    };
    await asyncOp(() => editId ? DB.updateAcademic(editId, data) : DB.addAcademic(data));
    const st = DB.getStudentById(data.studentId);
    if (st) DB.addNotification({ userId: st.userId, type:'grade_added', text:`New grade added for "${data.subject}" — ${data.marks}%` });
    showToast(editId ? 'Record updated' : 'Record added');
    closeModal('gradeModal');
    renderGrades();
  } catch(e) { showToast(e.message,'','error'); }
  finally { btn.disabled = false; btn.textContent = 'Save Record'; }
});

// ═══════════════════════════════════════════════════════
// VERIFY ACHIEVEMENTS
// ═══════════════════════════════════════════════════════
function renderVerify() {
  const pending = DB.getAchievements().filter(a => a.status === 'pending');
  refreshVBadge();
  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>Verify Achievements</h2><p>${pending.length} pending verification</p></div></div>
  ${pending.length ? `<div style="display:flex;flex-direction:column;gap:0.75rem">
    ${pending.map(a => {
      const st   = DB.getStudentById(a.studentId);
      const risk = DB.analyzeFakeRisk(a);
      return `<div class="card animate-in" style="border-left:3px solid ${risk.risk==='high'?'var(--red)':risk.risk==='medium'?'var(--amber)':'var(--b2)'}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem">
              <strong style="font-size:0.9rem">${esc(a.title)}</strong>
              ${typeChip(a.type)}
              ${risk.risk!=='low'?`<span class="chip ${risk.risk==='high'?'chip-red':'chip-amber'}">⚠ ${risk.risk==='high'?'High':'Medium'} Risk</span>`:''}
            </div>
            <div class="text-xs text-muted">${esc(st?.name||'Unknown')} · ${esc(a.org)} · ${a.date||'—'}</div>
            ${a.desc?`<div class="text-sm" style="color:var(--text2);margin-top:0.3rem">${esc(a.desc)}</div>`:''}
            <div class="skill-tags mt-1">${(a.skills||[]).map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('')}</div>
            ${risk.flags.length?`<div class="text-xs" style="color:var(--amber);margin-top:0.3rem">⚠ ${risk.flags.join(' · ')}</div>`:''}
          </div>
          <div style="display:flex;gap:0.4rem;flex-shrink:0">
            <button class="btn btn-success btn-sm approve-btn" data-id="${esc(a.id)}" data-sid="${esc(a.studentId)}" data-oid="${esc(a.ownerId||'')}" data-title="${esc(a.title)}">✓ Verify</button>
            <button class="btn btn-danger btn-sm reject-btn"  data-id="${esc(a.id)}" data-sid="${esc(a.studentId)}" data-oid="${esc(a.ownerId||'')}" data-title="${esc(a.title)}">✗ Reject</button>
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>` : `<div class="card animate-in"><div class="empty-state"><div class="ico">✅</div><p>All caught up! No pending verifications.</p></div></div>`}`;

  document.querySelectorAll('.approve-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      DB.verifyAchievement(btn.dataset.id, teacher.id, true);
      if (btn.dataset.oid) DB.addNotification({ userId:btn.dataset.oid, type:'achievement_verified', text:`"${btn.dataset.title}" has been verified ✓` });
      showToast('Achievement verified ✓');
      renderVerify();
    });
  });
  document.querySelectorAll('.reject-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!confirm('Reject this achievement?')) return;
      DB.verifyAchievement(btn.dataset.id, teacher.id, false);
      if (btn.dataset.oid) DB.addNotification({ userId:btn.dataset.oid, type:'achievement_rejected', text:`"${btn.dataset.title}" was not verified.` });
      showToast('Achievement rejected');
      renderVerify();
    });
  });
}

// ═══════════════════════════════════════════════════════
// RESEARCH
// ═══════════════════════════════════════════════════════
setupModal('researchModal', 'closeResBtn');

function renderResearch() {
  const pubs = DB.getResearchByTeacher(teacher.id);
  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in">
    <div class="page-hdr-left"><h2>My Research (${pubs.length})</h2><p>${pubs.filter(r=>r.status==='published').length} published</p></div>
    <div class="page-actions"><button class="btn btn-primary" id="addResBtn">+ Add Publication</button></div>
  </div>
  ${pubs.length ? `<div style="display:flex;flex-direction:column;gap:0.75rem">
    ${pubs.map(r=>`<div class="card animate-in">
      <div style="display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap">
        <div style="flex:1">
          <div style="font-family:var(--font-h);font-size:0.9rem;font-weight:800;margin-bottom:0.25rem">${esc(r.title)}</div>
          <div class="text-xs text-muted">${esc(r.journal)} · ${r.year}</div>
          ${r.doi?`<div class="text-xs" style="color:var(--cyan)">DOI: ${esc(r.doi)}</div>`:''}
          ${r.abstract?`<div class="text-sm" style="color:var(--text2);margin-top:0.3rem;line-height:1.6">${esc(r.abstract)}</div>`:''}
          ${r.coAuthors?.length?`<div class="text-xs text-muted mt-1">Co-authors: ${r.coAuthors.map(esc).join(', ')}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.3rem;flex-shrink:0">
          <span class="${r.status==='published'?'status-verified':r.status==='under_review'?'status-pending':'chip chip-gray'}">${r.status==='published'?'✓ Published':r.status==='under_review'?'⏳ Under Review':'Preprint'}</span>
          ${r.citations?`<span class="chip chip-cyan">📖 ${r.citations}</span>`:''}
          <div style="display:flex;gap:0.3rem;margin-top:0.3rem">
            <button class="btn btn-xs btn-secondary edit-res" data-id="${esc(r.id)}">Edit</button>
            <button class="btn btn-xs btn-danger del-res" data-id="${esc(r.id)}">Del</button>
          </div>
        </div>
      </div>
    </div>`).join('')}
  </div>` : `<div class="card animate-in"><div class="empty-state"><div class="ico">📄</div><p>No publications yet.</p></div></div>`}`;

  document.getElementById('addResBtn').addEventListener('click', () => openResModal(null));
  document.querySelectorAll('.edit-res').forEach(b => b.addEventListener('click', () => openResModal(b.dataset.id)));
  document.querySelectorAll('.del-res').forEach(b => b.addEventListener('click', () => {
    if (!confirm('Delete this publication?')) return;
    DB.deleteResearch(b.dataset.id); showToast('Deleted'); renderResearch();
  }));
}

function openResModal(editId) {
  document.getElementById('rEditId').value = editId || '';
  document.getElementById('resMTitle').textContent = editId ? '✏️ Edit Publication' : '📄 Add Publication';
  if (editId) {
    const r = DB.getResearchById(editId);
    if (r) {
      document.getElementById('rTitle').value   = r.title;
      document.getElementById('rJournal').value = r.journal;
      document.getElementById('rYear').value    = r.year;
      document.getElementById('rDoi').value     = r.doi || '';
      document.getElementById('rStatus').value  = r.status;
      document.getElementById('rCoAuth').value  = (r.coAuthors||[]).join(', ');
      document.getElementById('rAbstract').value= r.abstract || '';
    }
  } else {
    ['rTitle','rJournal','rYear','rDoi','rCoAuth','rAbstract'].forEach(id => document.getElementById(id).value='');
    document.getElementById('rStatus').value = 'under_review';
    document.getElementById('rYear').value   = new Date().getFullYear();
  }
  openModal('researchModal');
}

document.getElementById('saveResBtn').addEventListener('click', async () => {
  const btn = document.getElementById('saveResBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const editId = document.getElementById('rEditId').value;
    const data = {
      teacherId: teacher.id,
      title:     document.getElementById('rTitle').value,
      journal:   document.getElementById('rJournal').value,
      year:      document.getElementById('rYear').value,
      doi:       document.getElementById('rDoi').value,
      status:    document.getElementById('rStatus').value,
      coAuthors: document.getElementById('rCoAuth').value.split(',').map(s=>s.trim()).filter(Boolean),
      abstract:  document.getElementById('rAbstract').value,
    };
    await asyncOp(() => editId ? DB.updateResearch(editId, data) : DB.addResearch(data));
    showToast(editId ? 'Publication updated' : 'Publication added');
    closeModal('researchModal');
    renderResearch();
  } catch(e) { showToast(e.message,'','error'); }
  finally { btn.disabled = false; btn.textContent = 'Save Publication'; }
});

// ═══════════════════════════════════════════════════════
// ANALYTICS
// ═══════════════════════════════════════════════════════
function renderAnalytics() {
  const students = DB.getStudents();
  const achievs  = DB.getAchievements();
  const allAcRecs= DB.getAcademic();

  // Skill frequency across verified achievements
  const freq = {};
  achievs.filter(a=>a.status==='verified').forEach(a=>(a.skills||[]).forEach(s=>{freq[s]=(freq[s]||0)+1;}));
  const topSkills = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,8);

  // Risk distribution
  const riskDist = { high:0, medium:0, low:0 };
  students.forEach(st => { riskDist[DB.getRiskLevel(st.id)]++; });

  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>Student Analytics</h2><p>Campus-wide intelligence</p></div></div>
  <div class="grid-2 animate-in anim-delay-1">
    <div class="card">
      <div class="card-title">🔥 Top Skills (Verified)</div>
      ${topSkills.map(([s,c],i)=>`<div style="margin-bottom:0.55rem">
        <div class="progress-label"><span>${esc(s)}</span><span style="color:var(--cyan)">${c}</span></div>
        ${progressBar(c, topSkills[0]?.[1]||1, ['linear-gradient(90deg,var(--cyan),var(--violet))','linear-gradient(90deg,var(--emerald),var(--cyan))','linear-gradient(90deg,var(--amber),var(--emerald))'][i%3])}
      </div>`).join('')||'<div class="text-xs text-muted">No verified skills yet</div>'}
    </div>
    <div class="card">
      <div class="card-title">📊 Risk Distribution</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-bottom:1rem">
        ${[['🔴 High',riskDist.high,'var(--red)'],['🟡 Medium',riskDist.medium,'var(--amber)'],['🟢 Low',riskDist.low,'var(--emerald)']].map(([l,v,c])=>`
        <div style="text-align:center;background:var(--b3);border-radius:8px;padding:0.75rem">
          <div class="text-xs text-muted">${l}</div>
          <div style="font-family:var(--font-h);font-size:1.6rem;font-weight:800;color:${c}">${v}</div>
        </div>`).join('')}
      </div>
      <div class="card-title">🏆 Achievement Status</div>
      ${[['Verified',achievs.filter(a=>a.status==='verified').length,'var(--emerald)'],['Pending',achievs.filter(a=>a.status==='pending').length,'var(--amber)'],['Rejected',achievs.filter(a=>a.status==='rejected').length,'var(--red)']].map(([l,v,c])=>`
      <div style="margin-bottom:0.5rem">
        <div class="progress-label"><span>${l}</span><span style="color:${c}">${v}</span></div>
        ${progressBar(v, achievs.length||1, `linear-gradient(90deg,${c},${c})`)}
      </div>`).join('')}
    </div>
  </div>
  <div class="card mt-2 animate-in anim-delay-2">
    <div class="card-title">🎓 Per-Student Breakdown</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Student</th><th>Dept</th><th>GPA</th><th>Readiness</th><th>Verified Achs</th><th>Weak Areas</th><th>Risk</th></tr></thead>
      <tbody>${students.map(st=>{
        const r   = DB.calcReadiness(st.id);
        const achv= achievs.filter(a=>a.studentId===st.id&&a.status==='verified').length;
        const weak= DB.getWeakAreas(st.id).length;
        const risk= DB.getRiskLevel(st.id);
        return `<tr>
          <td><strong>${esc(st.name)}</strong></td>
          <td>${esc(st.dept)} Y${st.year}</td>
          <td style="color:var(--cyan);font-weight:600">${st.gpa}</td>
          <td><span style="font-weight:700;color:${readinessColor(r)}">${r}/100</span></td>
          <td><span class="chip chip-emerald">${achv}</span></td>
          <td>${weak?`<span class="chip chip-red">${weak}</span>`:'<span class="chip chip-emerald">0</span>'}</td>
          <td>${riskChip(risk)}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;
  animateBars();
}
