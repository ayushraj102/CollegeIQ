<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CampusIQ — Admin Portal</title>
<script src="theme.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="theme.css">
</head>
<body>
<div id="toast-wrap"></div>
<div class="app-shell">
  <header class="topbar">
    <div class="tb-brand"><div class="tb-brand-icon">IQ</div>Campus<em style="color:var(--cyan);font-style:normal;font-family:var(--font-h)">IQ</em><span style="font-size:0.6rem;color:var(--red);background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);padding:0.12rem 0.45rem;border-radius:4px;margin-left:0.3rem;font-weight:700">ADMIN</span></div>
    <div class="tb-right">
      <span class="tb-badge badge-admin">System Admin</span>
      <div class="tb-user"><div class="avatar av-sm" id="tbAvatar" style="background:linear-gradient(135deg,#EF4444,#F97316)"></div><span id="tbName"></span></div>
      <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle light/dark"></button>
      <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </div>
  </header>
  <aside class="sidebar">
    <div class="sb-section">Overview</div>
    <div class="sb-item active" data-page="overview"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</div>
    <div class="sb-section">Users</div>
    <div class="sb-item" data-page="students"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Students</div>
    <div class="sb-item" data-page="teachers"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Teachers</div>
    <div class="sb-item" data-page="recruiters"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>Recruiters</div>
    <div class="sb-section">Content</div>
    <div class="sb-item" data-page="achievements"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>All Achievements</div>
    <div class="sb-item" data-page="research"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Research</div>
    <div class="sb-section">System</div>
    <div class="sb-item" data-page="adduser"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>Add User</div>
    <div class="sb-item" data-page="reset"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>Reset Data</div>
  </aside>
  <main class="main-area" id="mainArea"></main>
</div>

<script src="db.js"></script>
<script src="utils.js"></script>
<script src="auth.js"></script>
<script>
'use strict';
seedIfEmpty();
const session = Auth.guard('admin');
initTopbar(session);
document.getElementById('logoutBtn').addEventListener('click', () => Auth.logout());

const PAGES = { overview:renderOverview, students:renderStudents, teachers:renderTeachers, recruiters:renderRecruiters, achievements:renderAchievements, research:renderResearch, adduser:renderAddUser, reset:renderReset };
function renderPage(p) { showLoading('mainArea'); setTimeout(()=>(PAGES[p]||renderOverview)(), 80); }
setupNav(renderPage);

// ═══════════════════════════════════════════════════════
// OVERVIEW
// ═══════════════════════════════════════════════════════
function renderOverview() {
  const users    = DB.getUsers();
  const students = DB.getStudents();
  const teachers = DB.getTeachers();
  const achievs  = DB.getAchievements();
  const acRecs   = DB.getAcademic();
  const research = DB.getResearch();
  const pending  = achievs.filter(a=>a.status==='pending').length;
  const verified = achievs.filter(a=>a.status==='verified').length;

  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>System Overview</h2><p>CampusIQ Admin — schema v4</p></div></div>
  <div class="grid-4 animate-in anim-delay-1">
    ${[['Total Users',users.length,'var(--cyan)','👤'],['Students',students.length,'var(--violet)','🎓'],['Teachers',teachers.length,'var(--emerald)','👨‍🏫'],['Pending Verify',pending,'var(--amber)','🔍']].map(([l,v,c,i])=>`
    <div class="stat-card"><div class="stat-icon" style="background:${c}22">${i}</div><div class="stat-label">${l}</div><div class="stat-val" style="color:${c}">${v}</div></div>`).join('')}
  </div>
  <div class="grid-4 animate-in anim-delay-2" style="margin-top:1rem">
    ${[['Total Achievements',achievs.length,'var(--cyan)','🏆'],['Verified',verified,'var(--emerald)','✅'],['Academic Records',acRecs.length,'var(--violet)','📋'],['Research Papers',research.length,'var(--pink)','📄']].map(([l,v,c,i])=>`
    <div class="stat-card"><div class="stat-icon" style="background:${c}22">${i}</div><div class="stat-label">${l}</div><div class="stat-val" style="color:${c}">${v}</div></div>`).join('')}
  </div>
  <div class="grid-2 mt-2 animate-in anim-delay-3">
    <div class="card">
      <div class="card-title">🎓 Student Readiness</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Name</th><th>Dept</th><th>GPA</th><th>Readiness</th><th>Verified</th></tr></thead>
        <tbody>${students.map(st=>{
          const r = DB.calcReadiness(st.id);
          const v = achievs.filter(a=>a.studentId===st.id&&a.status==='verified').length;
          return `<tr><td><strong>${esc(st.name)}</strong></td><td class="text-xs">${esc(st.dept)} Y${st.year}</td><td style="color:var(--cyan);font-weight:600">${st.gpa}</td><td><span style="color:${readinessColor(r)};font-weight:700">${r}/100</span></td><td>${v}</td></tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>
    <div class="card">
      <div class="card-title">📊 Achievement Status</div>
      ${[['Verified',verified,'var(--emerald)'],['Pending',pending,'var(--amber)'],['Rejected',achievs.filter(a=>a.status==='rejected').length,'var(--red)']].map(([l,v,c])=>`
      <div style="margin-bottom:0.65rem">
        <div class="progress-label"><span>${l}</span><span style="color:${c}">${v}</span></div>
        ${progressBar(v, achievs.length||1, `linear-gradient(90deg,${c},${c})`)}
      </div>`).join('')}
      <div class="divider"></div>
      <div class="text-xs text-muted">Total: ${achievs.length} achievements</div>
    </div>
  </div>`;
  animateBars();
}

// ═══════════════════════════════════════════════════════
// STUDENTS
// ═══════════════════════════════════════════════════════
let studPage = 1;
function renderStudents(page = 1) {
  studPage = page;
  const students = DB.getStudents();
  const meta     = DB.paginate(students, page, 10);
  const achievs  = DB.getAchievements();

  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in">
    <div class="page-hdr-left"><h2>Students (${students.length})</h2></div>
    <div class="page-actions"><button class="btn btn-primary go-add">+ Add Student</button></div>
  </div>
  <div class="card animate-in anim-delay-1" id="studWrap">
    <div class="tbl-wrap"><table>
      <thead><tr><th>Name / Roll</th><th>Email</th><th>Dept</th><th>Year</th><th>GPA</th><th>Readiness</th><th>Verified</th><th>Action</th></tr></thead>
      <tbody>${meta.items.map(st=>{
        const user = DB.getUserById(st.userId);
        const r    = DB.calcReadiness(st.id);
        const achv = achievs.filter(a=>a.studentId===st.id&&a.status==='verified').length;
        return `<tr>
          <td><strong>${esc(st.name)}</strong><br><span class="text-xs text-muted">${esc(st.rollNo)}</span></td>
          <td class="text-xs">${esc(user?.email||'—')}</td>
          <td><span class="chip chip-cyan">${esc(st.dept)}</span></td>
          <td>Y${st.year}</td>
          <td style="color:var(--cyan);font-weight:600">${st.gpa}</td>
          <td><span style="font-weight:700;color:${readinessColor(r)}">${r}/100</span></td>
          <td><span class="chip chip-emerald">${achv}</span></td>
          <td><button class="btn btn-xs btn-danger del-user" data-uid="${esc(st.userId)}">Delete</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;

  renderPaginator(meta, 'studWrap', renderStudents);
  document.querySelectorAll('.go-add').forEach(b => b.addEventListener('click', () => document.querySelector('[data-page="adduser"]').click()));
  document.querySelectorAll('.del-user').forEach(btn => btn.addEventListener('click', () => {
    if (!confirm('Delete this user and all their data?')) return;
    try { DB.deleteUser(btn.dataset.uid); showToast('User deleted'); renderStudents(studPage); }
    catch(e) { showToast(e.message,'','error'); }
  }));
}

// ═══════════════════════════════════════════════════════
// TEACHERS
// ═══════════════════════════════════════════════════════
function renderTeachers() {
  const teachers = DB.getTeachers();
  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in">
    <div class="page-hdr-left"><h2>Teachers (${teachers.length})</h2></div>
    <div class="page-actions"><button class="btn btn-primary go-add">+ Add Teacher</button></div>
  </div>
  <div class="card animate-in anim-delay-1">
    <div class="tbl-wrap"><table>
      <thead><tr><th>Name</th><th>Email</th><th>Department</th><th>Subjects</th><th>Publications</th><th>Action</th></tr></thead>
      <tbody>${teachers.map(t=>{
        const user = DB.getUserById(t.userId);
        const pubs = DB.getResearchByTeacher(t.id).filter(r=>r.status==='published').length;
        return `<tr>
          <td><strong>${esc(t.name)}</strong></td>
          <td class="text-xs">${esc(user?.email||'—')}</td>
          <td>${esc(t.dept)}</td>
          <td><div class="skill-tags">${(t.subjects||[]).map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('')}</div></td>
          <td><span class="chip chip-emerald">${pubs} published</span></td>
          <td><button class="btn btn-xs btn-danger del-user" data-uid="${esc(t.userId)}">Delete</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;
  document.querySelectorAll('.go-add').forEach(b => b.addEventListener('click', () => document.querySelector('[data-page="adduser"]').click()));
  document.querySelectorAll('.del-user').forEach(btn => btn.addEventListener('click', () => {
    if (!confirm('Delete this teacher?')) return;
    try { DB.deleteUser(btn.dataset.uid); showToast('Teacher deleted'); renderTeachers(); }
    catch(e) { showToast(e.message,'','error'); }
  }));
}

// ═══════════════════════════════════════════════════════
// RECRUITERS
// ═══════════════════════════════════════════════════════
function renderRecruiters() {
  const recruiters = DB.getRecruiters();
  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in">
    <div class="page-hdr-left"><h2>Recruiters (${recruiters.length})</h2></div>
    <div class="page-actions"><button class="btn btn-primary go-add">+ Add Recruiter</button></div>
  </div>
  <div class="card animate-in anim-delay-1">
    ${recruiters.length ? `<div class="tbl-wrap"><table>
      <thead><tr><th>Name</th><th>Email</th><th>Company</th><th>Open Jobs</th><th>Action</th></tr></thead>
      <tbody>${recruiters.map(r=>{
        const user = DB.getUserById(r.userId);
        const jobs = DB.getJobs().filter(j=>j.recruiterId===r.userId&&j.status==='open').length;
        return `<tr>
          <td><strong>${esc(r.name)}</strong></td>
          <td class="text-xs">${esc(user?.email||'—')}</td>
          <td>${esc(r.company||'—')}</td>
          <td><span class="chip chip-cyan">${jobs}</span></td>
          <td><button class="btn btn-xs btn-danger del-user" data-uid="${esc(r.userId)}">Delete</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>` : `<div class="empty-state"><div class="ico">💼</div><p>No recruiters yet.</p></div>`}
  </div>`;
  document.querySelectorAll('.go-add').forEach(b => b.addEventListener('click', () => document.querySelector('[data-page="adduser"]').click()));
  document.querySelectorAll('.del-user').forEach(btn => btn.addEventListener('click', () => {
    if (!confirm('Delete this recruiter?')) return;
    try { DB.deleteUser(btn.dataset.uid); showToast('Recruiter deleted'); renderRecruiters(); }
    catch(e) { showToast(e.message,'','error'); }
  }));
}

// ═══════════════════════════════════════════════════════
// ALL ACHIEVEMENTS
// ═══════════════════════════════════════════════════════
let achPage = 1;
function renderAchievements(page = 1) {
  achPage = page;
  const achievs  = DB.getAchievements();
  const students = DB.getStudents();
  const meta     = DB.paginate(achievs.slice().reverse(), page, 15);

  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>All Achievements (${achievs.length})</h2><p>${achievs.filter(a=>a.status==='verified').length} verified · ${achievs.filter(a=>a.status==='pending').length} pending</p></div></div>
  <div class="card animate-in anim-delay-1" id="achWrap">
    <div class="tbl-wrap"><table>
      <thead><tr><th>Title</th><th>Student</th><th>Type</th><th>Skills</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>${meta.items.map(a=>{
        const st=students.find(s=>s.id===a.studentId);
        return `<tr>
          <td><strong>${esc(a.title)}</strong><br><span class="text-xs text-muted">${esc(a.org)}</span></td>
          <td class="text-xs">${esc(st?.name||'—')}</td>
          <td>${typeChip(a.type)}</td>
          <td><div class="skill-tags">${(a.skills||[]).slice(0,4).map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('')}</div></td>
          <td class="text-xs">${a.date||'—'}</td>
          <td>${statusChip(a.status)}</td>
          <td><button class="btn btn-xs btn-danger del-ach" data-id="${esc(a.id)}" ${a.status==='verified'?'disabled title="Cannot delete verified"':''}>Del</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;
  renderPaginator(meta, 'achWrap', renderAchievements);
  document.querySelectorAll('.del-ach:not([disabled])').forEach(btn => btn.addEventListener('click', () => {
    if (!confirm('Delete this achievement?')) return;
    try { DB.deleteAchievement(btn.dataset.id); showToast('Deleted'); renderAchievements(achPage); }
    catch(e) { showToast(e.message,'','error'); }
  }));
}

// ═══════════════════════════════════════════════════════
// RESEARCH
// ═══════════════════════════════════════════════════════
function renderResearch() {
  const pubs    = DB.getResearch();
  const teachers= DB.getTeachers();
  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>Research Papers (${pubs.length})</h2></div></div>
  <div style="display:flex;flex-direction:column;gap:0.65rem animate-in anim-delay-1">
    ${pubs.map(r=>{
      const t=teachers.find(x=>x.id===r.teacherId);
      return `<div class="card animate-in">
        <div style="display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap">
          <div style="flex:1">
            <div style="font-family:var(--font-h);font-size:0.88rem;font-weight:800;margin-bottom:0.2rem">${esc(r.title)}</div>
            <div class="text-xs text-muted">by ${esc(t?.name||'Unknown')} · ${esc(r.journal)} · ${r.year}</div>
            ${r.doi?`<div class="text-xs" style="color:var(--cyan)">DOI: ${esc(r.doi)}</div>`:''}
            ${r.abstract?`<div class="text-sm" style="color:var(--text2);margin-top:0.3rem">${esc(r.abstract)}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.3rem;flex-shrink:0">
            <span class="${r.status==='published'?'status-verified':r.status==='under_review'?'status-pending':'chip chip-gray'}">${r.status==='published'?'✓ Published':r.status==='under_review'?'⏳ Under Review':'Preprint'}</span>
            ${r.citations?`<span class="chip chip-cyan">📖 ${r.citations}</span>`:''}
          </div>
        </div>
      </div>`;
    }).join('')||`<div class="card"><div class="empty-state"><div class="ico">📄</div><p>No research papers.</p></div></div>`}
  </div>`;
}

// ═══════════════════════════════════════════════════════
// ADD USER (fully functional)
// ═══════════════════════════════════════════════════════
function renderAddUser() {
  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>Add User</h2><p>Create a new user account with linked profile</p></div></div>
  <div class="card animate-in anim-delay-1" style="max-width:640px">
    <div class="form-row-2">
      <div class="form-group"><label>Full Name *</label><input class="form-control" id="uName" placeholder="Full name"></div>
      <div class="form-group"><label>Email * (must be unique)</label><input class="form-control" id="uEmail" type="email" placeholder="user@campusiq.edu"></div>
    </div>
    <div class="form-row-2">
      <div class="form-group"><label>Password * (min 6 chars)</label><input class="form-control" id="uPass" type="password" placeholder="Password"></div>
      <div class="form-group"><label>Role *</label>
        <select class="form-control" id="uRole">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
          <option value="recruiter">Recruiter</option>
        </select>
      </div>
    </div>
    <!-- Student fields -->
    <div id="studentFields">
      <div class="divider"></div>
      <div class="text-xs text-muted mb-1" style="font-weight:700;text-transform:uppercase;letter-spacing:0.05em">Student Details</div>
      <div class="form-row-3">
        <div class="form-group"><label>Department *</label><input class="form-control" id="uDept" placeholder="CSE"></div>
        <div class="form-group"><label>Year *</label><input class="form-control" type="number" id="uYear" min="1" max="6" placeholder="1–6"></div>
        <div class="form-group"><label>Roll No. *</label><input class="form-control" id="uRoll" placeholder="CS21001"></div>
      </div>
      <div class="form-row-3">
        <div class="form-group"><label>Section</label><input class="form-control" id="uSection" placeholder="A"></div>
        <div class="form-group"><label>GPA (0–10)</label><input class="form-control" type="number" id="uGpa" step="0.1" min="0" max="10" placeholder="8.5"></div>
        <div class="form-group"><label>Phone</label><input class="form-control" id="uPhone" placeholder="9876543210"></div>
      </div>
    </div>
    <!-- Teacher fields -->
    <div id="teacherFields" style="display:none">
      <div class="divider"></div>
      <div class="text-xs text-muted mb-1" style="font-weight:700;text-transform:uppercase;letter-spacing:0.05em">Teacher Details</div>
      <div class="form-row-2">
        <div class="form-group"><label>Department *</label><input class="form-control" id="tDept" placeholder="Computer Science"></div>
        <div class="form-group"><label>Subjects (comma-separated)</label><input class="form-control" id="tSubjects" placeholder="ML, Python, DSA"></div>
      </div>
    </div>
    <!-- Recruiter fields -->
    <div id="recruiterFields" style="display:none">
      <div class="divider"></div>
      <div class="text-xs text-muted mb-1" style="font-weight:700;text-transform:uppercase;letter-spacing:0.05em">Recruiter Details</div>
      <div class="form-group"><label>Company Name</label><input class="form-control" id="rCompany" placeholder="TechCorp"></div>
    </div>
    <div class="divider"></div>
    <button class="btn btn-primary w-full" id="createUserBtn">Create User</button>
    <div id="createMsg" style="margin-top:0.75rem;display:none"></div>
  </div>`;

  // Role toggle
  document.getElementById('uRole').addEventListener('change', function() {
    document.getElementById('studentFields').style.display  = this.value==='student'  ? '' : 'none';
    document.getElementById('teacherFields').style.display  = this.value==='teacher'  ? '' : 'none';
    document.getElementById('recruiterFields').style.display= this.value==='recruiter'? '' : 'none';
  });

  document.getElementById('createUserBtn').addEventListener('click', async () => {
    const btn   = document.getElementById('createUserBtn');
    const msgEl = document.getElementById('createMsg');
    btn.disabled = true; btn.textContent = 'Creating…';
    msgEl.style.display = 'none';
    try {
      const role = document.getElementById('uRole').value;
      const data = {
        name:     document.getElementById('uName').value,
        email:    document.getElementById('uEmail').value,
        password: document.getElementById('uPass').value,
        role,
      };
      if (role === 'student') Object.assign(data, {
        dept: document.getElementById('uDept').value, year: document.getElementById('uYear').value,
        rollNo: document.getElementById('uRoll').value, section: document.getElementById('uSection').value||'A',
        gpa: document.getElementById('uGpa').value||0, phone: document.getElementById('uPhone').value,
      });
      else if (role === 'teacher') Object.assign(data, {
        dept: document.getElementById('tDept').value, subjects: document.getElementById('tSubjects').value,
      });
      else if (role === 'recruiter') data.company = document.getElementById('rCompany').value;

      const result = await asyncOp(() => DB.createUser(data));
      msgEl.style.display = 'block';
      msgEl.innerHTML = `<div class="chip chip-emerald" style="display:inline-flex;gap:0.4rem;font-size:0.75rem">✓ ${esc(role.charAt(0).toUpperCase()+role.slice(1))} created! Email: ${esc(data.email)} · Password: ${esc(data.password)}</div>`;
      showToast(`${role} account created!`, `Email: ${data.email}`);
      ['uName','uEmail','uPass','uDept','uYear','uRoll','uSection','uGpa','uPhone','tDept','tSubjects','rCompany'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
    } catch(e) {
      msgEl.style.display = 'block';
      msgEl.innerHTML = `<div class="chip chip-red" style="display:inline-flex;gap:0.4rem;font-size:0.75rem">❌ ${esc(e.message)}</div>`;
      showToast(e.message,'','error');
    } finally { btn.disabled=false; btn.textContent='Create User'; }
  });
}

// ═══════════════════════════════════════════════════════
// RESET DATA
// ═══════════════════════════════════════════════════════
function renderReset() {
  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>Reset Data</h2><p>⚠️ Destructive operations</p></div></div>
  <div class="card animate-in anim-delay-1" style="border-color:rgba(239,68,68,0.3);max-width:580px">
    <div class="card-title" style="color:var(--red)">⚠️ Data Management</div>
    <div style="display:flex;flex-direction:column;gap:0.75rem">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0.85rem;background:rgba(239,68,68,0.04);border:1px solid rgba(239,68,68,0.15);border-radius:9px">
        <div><div style="font-weight:600;font-size:0.85rem">Reset All Data</div><div class="text-xs text-muted">Wipes everything and re-seeds fresh demo data</div></div>
        <button class="btn btn-danger" id="resetAllBtn">Reset All</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0.85rem;background:rgba(245,158,11,0.04);border:1px solid rgba(245,158,11,0.15);border-radius:9px">
        <div><div style="font-weight:600;font-size:0.85rem">Clear Achievements Only</div><div class="text-xs text-muted">Removes all achievement records (keeps users)</div></div>
        <button class="btn btn-amber" id="clearAchBtn">Clear Achievements</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0.85rem;background:rgba(16,185,129,0.04);border:1px solid rgba(16,185,129,0.15);border-radius:9px">
        <div><div style="font-weight:600;font-size:0.85rem">Export Data (JSON)</div><div class="text-xs text-muted">Download all CampusIQ data as JSON</div></div>
        <button class="btn btn-success" id="exportBtn">Export</button>
      </div>
    </div>
  </div>`;

  document.getElementById('resetAllBtn').addEventListener('click', () => {
    if (!confirm('RESET ALL DATA? Cannot be undone.')) return;
    Object.keys(localStorage).filter(k=>k.startsWith('ciq_')).forEach(k=>localStorage.removeItem(k));
    showToast('All data reset. Reloading…');
    setTimeout(() => window.location.reload(), 1500);
  });
  document.getElementById('clearAchBtn').addEventListener('click', () => {
    if (!confirm('Clear all achievements?')) return;
    localStorage.removeItem('ciq_achievements'); localStorage.removeItem('ciq_notifs');
    showToast('Achievements cleared'); renderReset();
  });
  document.getElementById('exportBtn').addEventListener('click', () => {
    const keys = ['users','students','teachers','recruiters','achievements','academic','research','jobs'];
    const data = {}; keys.forEach(k => { data[k] = JSON.parse(localStorage.getItem('ciq_'+k)||'[]'); });
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a'); a.href=url; a.download='campusiq_export_'+Date.now()+'.json'; a.click();
    URL.revokeObjectURL(url);
    showToast('Data exported!');
  });
}

renderPage('overview');
</script>
