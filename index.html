<!DOCTYPE html>
<html lang="en">
<head>
<script src="theme.js"></script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CampusIQ — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="shared.css">
<style>
/* ─── PREMIUM SAAS DESIGN SYSTEM (From Code 1) ─── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#04070F;--s1:#080E1C;--s2:#0C1525;
  --cyan:#38BDF8;--violet:#8B5CF6;--emerald:#10B981;--amber:#F59E0B;--red:#EF4444;
  --text:#F8FAFC;--text2:#94A3B8;--muted:#475569;
  --fh:'Syne',sans-serif;--fb:'Outfit',sans-serif;
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
}
html,body{height:100%;margin:0;padding:0;overflow:hidden;background:var(--bg);}
body{color:var(--text);font-family:var(--fb);display:flex;}

#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.8;}
.page{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;width:100vw;height:100vh;}

/* LEFT PANEL */
.left{
  background:linear-gradient(135deg, rgba(6,13,30,0.8), rgba(9,21,37,0.9));
  backdrop-filter: blur(20px); padding: 4rem;
  display:flex;flex-direction:column;justify-content:center;
  position:relative;overflow:hidden; border-right: 1px solid var(--glass-border);
}
.orb-1{position:absolute;width:600px;height:600px;background:var(--cyan);top:-200px;left:-200px;border-radius:50%;filter:blur(120px);opacity:0.15;}
.orb-2{position:absolute;width:400px;height:400px;background:var(--violet);bottom:-100px;right:-100px;border-radius:50%;filter:blur(100px);opacity:0.1;}
.left-content { position: relative; z-index: 2; max-width: 480px; }
.left-brand{display:flex;align-items:center;gap:0.75rem;margin-bottom:3rem;}
.brand-icon{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg, var(--cyan), var(--violet));display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:0.85rem;font-weight:800;color:#fff;box-shadow: 0 8px 20px rgba(56,189,248,0.3);}
.brand-name{font-family:var(--fh);font-size:1.4rem;font-weight:800;letter-spacing:-0.5px;}
.brand-name em{color:var(--cyan);font-style:normal;}
.left-headline{font-family:var(--fh);font-size:2.8rem;font-weight:800;line-height:1.1;margin-bottom:1rem;letter-spacing:-1px;}
.left-headline span{background:linear-gradient(90deg, #38BDF8, #A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.left-sub{font-size:1rem;color:var(--text2);line-height:1.6;margin-bottom:3rem;}

.fc{background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));border: 1px solid var(--glass-border);border-radius: 16px; padding: 1.2rem; backdrop-filter: blur(12px); margin-bottom: 1rem; display: flex; align-items: flex-start; gap: 1rem;}

/* RIGHT PANEL */
.right{background:#05080F; display:flex;flex-direction:column;align-items:center; justify-content:center; height:100vh; position: relative;}
.right-glow {position: absolute; width: 400px; height: 400px; background: var(--violet); border-radius: 50%; filter: blur(150px); opacity: 0.08; top: 50%; left: 50%; transform: translate(-50%, -50%);}
.auth-box {width: 100%; max-width: 420px; position: relative; z-index: 2; padding: 2rem;}

/* Role Tabs & Inputs */
.role-tabs{display:flex;gap:0.25rem;padding:0.3rem;background:rgba(0,0,0,0.3);border-radius:12px;margin-bottom:2rem;border:1px solid var(--glass-border);}
.rtab{flex:1;padding:0.6rem 0;border-radius:8px;font-size:0.75rem;font-weight:600;text-align:center;cursor:pointer;border:none;background:none;color:var(--text2);transition:0.3s;}
.rtab.active{background:rgba(255,255,255,0.1);color:#fff;}

.login-h1{font-family:var(--fh);font-size:2rem;font-weight:800;margin-bottom:0.5rem;}
.login-sub{font-size:0.9rem;color:var(--text2);margin-bottom:2rem;}

.input-group { position: relative; margin-bottom: 1.2rem; }
.form-input {
  width: 100%; background: #0A101C; border: 1px solid var(--glass-border);
  border-radius: 12px; padding: 1.4rem 1rem 0.6rem 1rem; color: white;
  outline: none; font-family: var(--fb); font-size: 0.9rem; transition: 0.3s;
}
.floating-label {position: absolute; left: 1rem; top: 1rem; color: var(--text2); font-size: 0.9rem; pointer-events: none; transition: 0.2s;}
.form-input:focus ~ .floating-label, .form-input:not(:placeholder-shown) ~ .floating-label {
  top: 0.4rem; font-size: 0.65rem; color: var(--cyan); font-weight: 600; text-transform: uppercase;
}

/* BUTTONS */
.btn-glow-wrap { position: relative; width: 100%; margin-top: 1rem; margin-bottom: 1rem; }
.btn-glow { position: absolute; inset: 0; background: linear-gradient(135deg, var(--cyan), var(--violet)); filter: blur(12px); opacity: 0.4; border-radius: 12px; }
.btn-login {
  position: relative; z-index: 1; width: 100%; padding: 0.9rem; border-radius: 12px; border: none;
  background: linear-gradient(135deg, #38BDF8, #8B5CF6); color: #fff; font-weight: 700; cursor: pointer;
}
.btn-bypass {
  width: 100%; background: transparent; color: var(--text2); border: 1px dashed var(--glass-border);
  padding: 0.7rem; border-radius: 10px; font-size: 0.8rem; cursor: pointer; margin-top: 1rem;
}

/* Divider & Animations */
.divider-wrap { display:flex; align-items:center; margin: 1.5rem 0; }
.divider-line { flex:1; height:1px; background:var(--glass-border); }
.divider-text { color:var(--muted); font-size:0.75rem; padding:0 1rem; }
.stagger-1 { animation: slideUpFade 0.6s ease forwards; opacity: 0; }
@keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

@media(max-width:768px){.left{display:none;}.page{grid-template-columns:1fr;}}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div id="toast-wrap" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;"></div>

<div class="page">
  <div class="left">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="left-content stagger-1">
      <div class="left-brand">
        <div class="brand-icon">IQ</div>
        <div class="brand-name">Campus<em>IQ</em></div>
      </div>
      <div class="left-headline">Turn Campus Activity<br>into <span>Verified Talent</span></div>
      <p class="left-sub">AI-powered skill intelligence for the next generation of builders.</p>
    </div>
  </div>

  <div class="right">
    <div class="right-glow"></div>
    <div class="auth-box">
      
      <div id="signInView">
        <div class="role-tabs stagger-1">
          <button class="rtab active" data-role="student">Student</button>
          <button class="rtab" data-role="teacher">Teacher</button>
          <button class="rtab" data-role="recruiter">Recruiter</button>
        </div>
        <div class="login-h1">Welcome Back</div>
        <div class="login-sub" id="loginSub">Sign in to your portal</div>

        <form id="loginForm">
          <div class="input-group">
            <input class="form-input" id="loginEmail" type="email" placeholder=" " required>
            <label class="floating-label">Institutional Email</label>
          </div>
          <div class="input-group">
            <input class="form-input" id="loginPass" type="password" placeholder=" " required>
            <label class="floating-label">Password</label>
          </div>
          <div class="btn-glow-wrap">
            <div class="btn-glow"></div>
            <button class="btn-login" id="loginBtn" type="submit">Sign In</button>
          </div>
        </form>

        <div class="divider-wrap">
          <div class="divider-line"></div>
          <div class="divider-text">Or</div>
          <div class="divider-line"></div>
        </div>

        <div id="googleBtnContainer" style="display:flex; justify-content:center; width:100%;"></div>

        <button class="btn-bypass" id="bypassBtn">Test Bypass (Dev Mode)</button>
        <div style="text-align:center; margin-top:1.5rem; font-size:0.85rem;">
          Don't have an account? <a id="goRegister" style="color:var(--cyan); cursor:pointer;">Sign up here</a>
        </div>
      </div>

      <div id="registerView" style="display:none">
        <div class="login-h1">Create Account</div>
        <form id="registerForm">
          <div class="input-group"><input class="form-input" id="regName" placeholder=" " required><label class="floating-label">Full Name</label></div>
          <div class="input-group"><input class="form-input" id="regEmail" type="email" placeholder=" " required><label class="floating-label">Institutional Email</label></div>
          <div class="input-group"><input class="form-input" id="regPass" type="password" placeholder=" " required><label class="floating-label">Password (6+ chars)</label></div>
          <div class="btn-glow-wrap">
            <div class="btn-glow"></div>
            <button class="btn-login" id="regBtn" type="submit">Create Account</button>
          </div>
        </form>
        <div style="text-align:center; margin-top:1.5rem; font-size:0.85rem;">
          Already have an account? <a id="goLogin" style="color:var(--cyan); cursor:pointer;">Sign in</a>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="db.js"></script>
<script src="utils.js"></script>
<script src="auth.js"></script>

<script>
'use strict';

const ROUTE_MAP = { student: 'student.html', teacher: 'teacher.html', recruiter: 'recruiter.html' };
let activeRole = 'student';

// --- UI Logic (Code 1 Style) ---
document.querySelectorAll('.rtab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.rtab').forEach(b => b.classList.remove('active'));
    tab.classList.add('active');
    activeRole = tab.dataset.role;
    document.getElementById('loginSub').textContent = `Sign in to your ${activeRole} portal`;
  });
});

const goReg = document.getElementById('goRegister'), goLog = document.getElementById('goLogin');
const signView = document.getElementById('signInView'), regView = document.getElementById('registerView');
goReg.onclick = () => { signView.style.display='none'; regView.style.display='block'; };
goLog.onclick = () => { signView.style.display='block'; regView.style.display='none'; };

function saasToast(msg, type='ok') {
  if(typeof showToast === 'function') { showToast(msg, '', type); }
  else { alert(msg); }
}

// --- Logic & Validation (Code 2 Style) ---
document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Authenticating...';
  try {
    const session = await Auth.login(document.getElementById('loginEmail').value.trim(), document.getElementById('loginPass').value);
    saasToast(`Welcome back, ${session.name.split(' ')[0]}`);
    setTimeout(() => window.location.href = ROUTE_MAP[session.role], 800);
  } catch(err) {
    saasToast(err.message, 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
};

document.getElementById('registerForm').onsubmit = async (e) => {
  e.preventDefault();
  const email = document.getElementById('regEmail').value.trim().toLowerCase();
  const [local, domain] = email.split('@');

  // Strict Domain Check
  if (activeRole === 'student' && (domain !== 'iilm.edu' || !local.includes('ug'))) {
    saasToast("Students must use @iilm.edu containing 'ug'", 'error'); return;
  } else if (activeRole === 'teacher' && (domain !== 'iilm.edu' || local.includes('ug'))) {
    saasToast("Teachers must use @iilm.edu (No 'ug')", 'error'); return;
  }

  try {
    await Auth.register({ name: document.getElementById('regName').value, email, password: document.getElementById('regPass').value, role: activeRole });
    saasToast("Account Created.");
    setTimeout(() => window.location.href = ROUTE_MAP[activeRole], 800);
  } catch(err) { saasToast(err.message, 'error'); }
};

// --- Official Google Setup ---
window.onload = () => {
  if (typeof google !== 'undefined') {
    google.accounts.id.initialize({
      client_id: "70835003370-fbdg01a9mgp13s80cgd65174udp3h74k.apps.googleusercontent.com",
      callback: window.onGoogleSignIn
    });
    google.accounts.id.renderButton(
      document.getElementById("googleBtnContainer"),
      { theme: "filled_blue", size: "large", shape: "pill", width: 300 }
    );
  }
};

window.onGoogleSignIn = async (response) => {
  try {
    const session = Auth.handleGoogleCredential(response.credential);
    saasToast("Identity Verified");
    setTimeout(() => window.location.href = ROUTE_MAP[session.role], 800);
  } catch(err) { saasToast(err.message, 'error'); }
};

document.getElementById('bypassBtn').onclick = () => {
  saasToast("Bypassing... (Dev Mode)");
  const mockPayload = { email: "demo.ug24@iilm.edu", name: "Guest User" };
  const mockJwt = "b." + btoa(JSON.stringify(mockPayload)) + ".c";
  window.onGoogleSignIn({ credential: mockJwt });
};

// --- Background Animation ---
(function() {
  const c = document.getElementById('bgCanvas'), ctx = c.getContext('2d');
  let W, H;
  function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.onresize = resize;
  class P {
    constructor() { this.reset(); }
    reset() { this.x = Math.random()*W; this.y = Math.random()*H; this.vx = (Math.random()-0.5)*0.3; this.vy = (Math.random()-0.5)*0.3; this.r = 1; }
    draw() {
      ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(56,189,248,0.2)'; ctx.fill();
      this.x += this.vx; this.y += this.vy;
      if(this.x<0||this.x>W||this.y<0||this.y>H) this.reset();
    }
  }
  const pts = Array.from({length: 50}, () => new P());
  function loop() { ctx.clearRect(0,0,W,H); pts.forEach(p => p.draw()); requestAnimationFrame(loop); }
  loop();
})();
</script>
</body>
</html>
