<!DOCTYPE html>
<html lang="en">
<head>
<script src="theme.js"></script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CampusIQ — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="shared.css">
<style>
/* ─── PREMIUM UI: REFERENCE MATCH ─── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg-page: #A0A5B1; /* Cool slate background from reference */
  --modal-grad: linear-gradient(135deg, #FDFDFD 0%, #FDF4D4 100%);
  --yellow: #FDD14B;
  --yellow-hover: #F6C531;
  --text-main: #111827;
  --text-muted: #828A9A;
  --input-bg: #F4F5F7;
  --border-light: #E5E7EB;
  --fb: 'Inter', -apple-system, sans-serif;
  --fh: 'Outfit', sans-serif;
}
html,body{height:100%;margin:0;padding:0;background:var(--bg-page);font-family:var(--fb);display:flex;align-items:center;justify-content:center;}

/* ─── MAIN MODAL LAYOUT ─── */
.modal-wrapper {
  width: 92vw; max-width: 1200px; height: 85vh; min-height: 650px;
  background: var(--modal-grad);
  border-radius: 40px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
  display: flex; position: relative; overflow: hidden;
}

/* ─── LEFT PANEL (Form) ─── */
.left-panel {
  flex: 0 0 45%; padding: 3rem 4rem;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative;
}

.brand-pill {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 0.6rem 1.5rem; border-radius: 99px;
  border: 1px solid rgba(0,0,0,0.15);
  font-family: var(--fh); font-weight: 500; font-size: 1rem; color: var(--text-main);
  align-self: flex-start;
}

.form-container { width: 100%; max-width: 360px; margin: 0 auto; display: flex; flex-direction: column; justify-content: center; flex: 1; }

.header-title { font-family: var(--fh); font-size: 2rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem; text-align: center; }
.header-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2.5rem; text-align: center; }

/* Role Selector (Segmented Pill) */
.role-tabs {
  display: flex; background: rgba(0,0,0,0.04); border-radius: 99px; padding: 0.3rem; margin-bottom: 1.5rem;
}
.rtab {
  flex: 1; padding: 0.6rem 0; border-radius: 99px; border: none; background: transparent;
  font-size: 0.75rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all 0.3s;
}
.rtab.active { background: #fff; color: var(--text-main); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

/* Inputs */
.form-group { margin-bottom: 1.2rem; position: relative; }
.form-label { display: block; font-size: 0.75rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.5rem; margin-left: 0.8rem; }
.form-input {
  width: 100%; background: var(--input-bg); border: 2px solid transparent;
  border-radius: 99px; padding: 1rem 1.5rem; color: var(--text-main);
  font-family: var(--fb); font-size: 0.9rem; transition: all 0.2s;
}
.form-input::placeholder { color: #A0AABF; }
.form-input:focus { border-color: var(--yellow); background: #fff; outline: none; }

.pwd-toggle {
  position: absolute; right: 1.2rem; top: 2.2rem; background: none; border: none;
  color: #A0AABF; cursor: pointer; display: flex; align-items: center;
}

/* Buttons */
.btn-primary {
  width: 100%; background: var(--yellow); color: var(--text-main);
  border: none; border-radius: 99px; padding: 1.1rem; font-family: var(--fb);
  font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  margin-top: 0.5rem; margin-bottom: 1.2rem;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
}
.btn-primary:hover { background: var(--yellow-hover); transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

.social-btns { display: flex; gap: 1rem; }
.btn-social {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  background: transparent; border: 1px solid var(--border-light);
  border-radius: 99px; padding: 0.9rem; font-size: 0.85rem; font-weight: 500;
  color: var(--text-main); cursor: pointer; transition: all 0.2s;
}
.btn-social:hover { background: rgba(0,0,0,0.02); }

/* Footer Links */
.footer-links {
  display: flex; justify-content: space-between; width: 100%;
  font-size: 0.75rem; color: var(--text-muted); align-items: center;
}
.footer-links a { color: var(--text-main); font-weight: 600; text-decoration: underline; text-decoration-color: transparent; cursor: pointer; transition: text-decoration-color 0.2s; }
.footer-links a:hover { text-decoration-color: var(--text-main); }

/* ─── RIGHT PANEL (Image & Widgets) ─── */
.right-panel {
  flex: 1; margin: 1.5rem 1.5rem 1.5rem 0; border-radius: 32px;
  background: url('https://images.unsplash.com/photo-1522071820081-009f0129c71c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80') center/cover no-relative;
  position: relative; overflow: hidden;
}
.close-btn {
  position: absolute; top: 1.5rem; right: 1.5rem; width: 40px; height: 40px;
  background: rgba(255,255,255,0.9); border-radius: 50%; display: flex;
  align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem;
  color: var(--text-main); border: none; z-index: 10; backdrop-filter: blur(5px);
}

/* Floating Overlays */
.widget-yellow {
  position: absolute; top: 2rem; left: 2rem; background: var(--yellow);
  padding: 1rem 1.5rem; border-radius: 16px; color: var(--text-main);
  box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 2;
}
.w-title { font-size: 0.8rem; font-weight: 600; margin-bottom: 0.2rem; }
.w-time { font-size: 0.7rem; opacity: 0.8; }
.dot { position: absolute; top: 1rem; right: 1rem; width: 6px; height: 6px; background: #fff; border-radius: 50%; }

.widget-dark {
  position: absolute; top: 3.5rem; left: 4rem; background: rgba(31, 41, 55, 0.9);
  padding: 1rem 1.5rem; border-radius: 16px; color: #fff; z-index: 1;
  width: 200px; height: 70px; display: flex; align-items: flex-end;
}

.avatars {
  position: absolute; top: 35%; right: 3rem; display: flex; flex-direction: column; gap: -10px;
}
.avatar-circle {
  width: 48px; height: 48px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2);
  background: #ccc; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
.a1 { transform: translateX(-20px); z-index: 3; background: url('https://i.pravatar.cc/100?img=5') center/cover; }
.a2 { z-index: 2; background: url('https://i.pravatar.cc/100?img=9') center/cover; }
.a3 { transform: translateX(20px) translateY(-10px); z-index: 1; background: url('https://i.pravatar.cc/100?img=1') center/cover; }

.widget-glass {
  position: absolute; bottom: 2rem; right: 2rem; background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3);
  padding: 1.5rem; border-radius: 20px; color: #fff; width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
.calendar-days { display: flex; justify-content: space-between; text-align: center; margin-bottom: 1rem; }
.day { display: flex; flex-direction: column; gap: 0.4rem; }
.day span { font-size: 0.7rem; opacity: 0.8; }
.day strong { font-size: 1.1rem; font-weight: 500; }
.day.active strong { background: rgba(255,255,255,0.3); padding: 0.2rem 0.4rem; border-radius: 8px; }
.glass-graph { width: 100%; height: 40px; background: repeating-linear-gradient(45deg, rgba(255,255,255,0.1), rgba(255,255,255,0.1) 2px, transparent 2px, transparent 6px); border-radius: 8px; }

.widget-white {
  position: absolute; bottom: 2rem; left: 2rem; background: #fff;
  padding: 1.2rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  display: flex; flex-direction: column; gap: 0.5rem; z-index: 2;
}
.w-faces { display: flex; margin-top: 0.5rem; }
.w-faces img { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff; margin-right: -8px; }

/* ─── UTILS & ANIMATIONS ─── */
.spinner { width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.2); border-top-color: var(--text-main); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

.fade-in { animation: fadeIn 0.4s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Premium Toast Override */
.toast-lg { background: #111827; padding: 1rem 1.5rem; border-radius: 16px; color: white; font-family: var(--fb); font-size: 0.85rem; font-weight: 500; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.75rem; }
.toast-lg::before { content: ''; display: block; width: 8px; height: 8px; border-radius: 50%; background: var(--yellow); }
.toast-lg.error::before { background: var(--red); }

@media(max-width: 900px) {
  .modal-wrapper { flex-direction: column; width: 100vw; height: 100vh; border-radius: 0; }
  .right-panel { display: none; }
  .left-panel { padding: 2rem; }
}
</style>
</head>

              Apple

              Google
            </button>
          </div>

  <!-- ─── RIGHT IMAGE PANEL & WIDGETS ─── -->

<script>
'use strict';

const ROUTE_MAP = { student: 'student.html', teacher: 'teacher.html', admin: 'admin.html', recruiter: 'recruiter.html' };
let activeRole = 'student';
let isLogin = true;

// --- Role Tab Logic ---
document.querySelectorAll('.rtab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.rtab').forEach(b => b.classList.remove('active'));
    tab.classList.add('active');
    activeRole = tab.dataset.role;
  });
});

// --- View Toggle Logic ---
const signView = document.getElementById('signInView');
const regView = document.getElementById('registerView');
const toggleBtn = document.getElementById('toggleViewBtn');
const footerText = document.getElementById('footerText');

toggleBtn.onclick = (e) => {
  e.preventDefault();
  isLogin = !isLogin;
  if (isLogin) {
    signView.style.display = 'block';
    regView.style.display = 'none';
    footerText.innerHTML = `Don't have an account? <a id="toggleViewBtn">Sign up</a>`;
  } else {
    signView.style.display = 'none';
    regView.style.display = 'block';
    footerText.innerHTML = `Have any account? <a id="toggleViewBtn">Sign in</a>`;
  }
  // Re-bind the dynamically created link
  document.getElementById('toggleViewBtn').onclick = toggleBtn.onclick;
};

// --- Password Visibility Toggle ---
function setupPwdToggle(btnId, inputId) {
  const btn = document.getElementById(btnId);
  const input = document.getElementById(inputId);
  if(!btn || !input) return;
  btn.onclick = () => {
    if (input.type === 'password') {
      input.type = 'text';
      btn.innerHTML = '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    } else {
      input.type = 'password';
      btn.innerHTML = '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }
  };
}
setupPwdToggle('toggleLoginPwd', 'loginPass');
setupPwdToggle('toggleRegPwd', 'regPass');

// --- Toast & Buttons ---
function saasToast(msg, type='ok') {
  if(typeof showToast === 'function') { showToast(msg, '', type); return; }
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = `toast-lg ${type==='error'?'error':''}`;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3000);
}

function setBtnLoading(btnId, spinnerId, textId, isLoading) {
  const btn = document.getElementById(btnId);
  const spin = document.getElementById(spinnerId);
  const text = document.getElementById(textId);
  btn.disabled = isLoading;
  spin.style.display = isLoading ? 'inline-block' : 'none';
  text.textContent = isLoading ? 'Processing...' : (btnId==='loginBtn' ? 'Sign In' : 'Submit');
}

// --- Standard Login ---
document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;

  setBtnLoading('loginBtn', 'loginSpinner', 'loginBtnText', true);

  try {
    const session = await Auth.login(email, pass);
    saasToast(`Welcome back, ${session.name.split(' ')[0]}!`, 'ok');
    setTimeout(() => { window.location.href = ROUTE_MAP[session.role] || 'student.html'; }, 800);
  } catch(err) {
    saasToast(err.message, 'error');
    setBtnLoading('loginBtn', 'loginSpinner', 'loginBtnText', false);
  }
};

// --- Standard Register ---
document.getElementById('registerForm').onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('regEmail').value.trim().toLowerCase();
    const localPart = email.split('@')[0];
    const domain = email.split('@')[1] || '';

    if (activeRole === 'student' && (domain !== 'iilm.edu' || !localPart.includes('ug'))) {
        saasToast("Students must use @iilm.edu email containing 'ug'", 'error'); return;
    } else if (activeRole === 'teacher' && (domain !== 'iilm.edu' || localPart.includes('ug'))) {
        saasToast("Teachers must use @iilm.edu email without 'ug'", 'error'); return;
    }

    const data = {
        name: document.getElementById('regName').value,
        email: email,
        password: document.getElementById('regPass').value,
        role: activeRole
    };
    
    setBtnLoading('regBtn', 'regSpinner', 'regBtnText', true);
    try {
        await Auth.register(data);
        saasToast("Account created successfully!", 'ok');
        setTimeout(() => window.location.href = ROUTE_MAP[activeRole], 800);
    } catch(err) {
        saasToast(err.message, 'error');
        setBtnLoading('regBtn', 'regSpinner', 'regBtnText', false);
    }
};

// --- Google Login Configuration ---
const isPreviewEnv = window.location.hostname.includes('goog') || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '';

window.onload = () => {
    if (!isPreviewEnv && typeof google !== 'undefined' && google.accounts && google.accounts.id) {
        google.accounts.id.initialize({
            client_id: "70835003370-fbdg01a9mgp13s80cgd65174udp3h74k.apps.googleusercontent.com",
            callback: window.onGoogleSignIn
        });
    }
};

document.getElementById('googleBtn').onclick = () => {
  if (isPreviewEnv) {
     saasToast("Preview Mode: Simulating Google Login...", 'ok');
     setTimeout(() => {
         const mockPayload = { email: "demo.ug24@iilm.edu", name: "Google Demo Student" };
         const mockJwt = "mockHeader." + btoa(JSON.stringify(mockPayload)) + ".mockSignature";
         if (typeof window.onGoogleSignIn === 'function') window.onGoogleSignIn({ credential: mockJwt });
     }, 800);
     return;
  }

  if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
    google.accounts.id.prompt((notification) => {
      if (notification.isNotDisplayed()) {
         const reason = notification.getNotDisplayedReason();
         if (reason === 'origin_not_allowed' || reason === 'unregistered_origin') saasToast("Domain not whitelisted in Google Console.", 'error');
         else saasToast("Google Login unavailable.", 'error');
      }
    });
  } else { saasToast("Google Library failed to load.", 'error'); }
};

window.onGoogleSignIn = async (response) => {
  try {
    const session = Auth.handleGoogleCredential(response.credential);
    saasToast("Google Login Success!", 'ok');
    setTimeout(() => window.location.href = ROUTE_MAP[session.role], 800);
  } catch(err) { saasToast(err.message, 'error'); }
};
</script>
