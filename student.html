<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CampusIQ — Student Portal</title>
<script src="theme.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="theme.css">
</head>
<body>
<div id="toast-wrap"></div>
<div class="app-shell">
  <header class="topbar">
    <div class="tb-brand"><div class="tb-brand-icon">IQ</div>Campus<em style="color:var(--cyan);font-style:normal;font-family:var(--font-h)">IQ</em></div>
    <div class="tb-right">
      <span class="tb-badge badge-student">Student</span>
      <div class="notif-bell" id="notifBtn" title="Notifications">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="notif-dot" id="nDot" style="display:none"></span>
      </div>
      <div class="tb-user"><div class="avatar av-sm" id="tbAvatar" style="background:linear-gradient(135deg,#38BDF8,#8B5CF6)"></div><span id="tbName"></span></div>
      <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle light/dark"></button>
      <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </div>
  </header>
  <aside class="sidebar">
    <div class="sb-section">Academic</div>
    <div class="sb-item active" data-page="overview"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</div>
    <div class="sb-item" data-page="academics"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>My Academics</div>
    <div class="sb-section">Portfolio</div>
    <div class="sb-item" data-page="achievements"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>Achievements <span class="sb-badge" id="pendBadge" style="display:none">!</span></div>
    <div class="sb-item" data-page="skills"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Skill Profile</div>
    <div class="sb-item" data-page="profile"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My Profile</div>
  </aside>
  <main class="main-area" id="mainArea"></main>
</div>

<!-- UPLOAD ACHIEVEMENT MODAL -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal-box">
    <div class="modal-hdr"><span class="modal-title">📤 Upload Achievement</span><button class="modal-close" id="closeUploadBtn">✕</button></div>
    <div class="form-row-2">
      <div class="form-group"><label>Title *</label><input class="form-control" id="aTitle" placeholder="e.g. HackIndia 2025 — 1st Place"></div>
      <div class="form-group"><label>Organisation / Platform</label><input class="form-control" id="aOrg" placeholder="e.g. HackIndia"></div>
    </div>
    <div class="form-row-2">
      <div class="form-group"><label>Type</label>
        <select class="form-control" id="aType">
          <option value="hackathon">Hackathon</option><option value="ideathon">Ideathon</option>
          <option value="certification">Certification</option><option value="research">Research / Paper</option>
          <option value="competition">Competition</option><option value="project">Project</option>
          <option value="internship">Internship</option><option value="other">Other</option>
        </select>
      </div>
      <div class="form-group"><label>Date</label><input class="form-control" id="aDate" type="date"></div>
    </div>
    <div class="form-group"><label>Skills Demonstrated (comma-separated)</label><input class="form-control" id="aSkills" placeholder="e.g. React, Machine Learning, Python"></div>
    <div class="form-group"><label>Description</label><textarea class="form-control" id="aDesc" rows="3" placeholder="Describe your achievement…"></textarea></div>
    <button class="btn btn-primary w-full" id="submitAchBtn">Submit for Verification</button>
  </div>
</div>

<script src="db.js"></script>
<script src="utils.js"></script>
<script src="auth.js"></script>
<script>
'use strict';
seedIfEmpty();
const session = Auth.guard('student');
const student = DB.getStudentByUserId(session.userId);
if (!student) Auth.logout();

initTopbar(session);
document.getElementById('logoutBtn').addEventListener('click', () => Auth.logout());

// ── Notification dot ─────────────────────────────────────
function refreshNotifDot() {
  const unread = DB.getNotifications(session.userId).filter(n => !n.read).length;
  document.getElementById('nDot').style.display = unread ? 'block' : 'none';
}
document.getElementById('notifBtn').addEventListener('click', () => {
  DB.markNotifsRead(session.userId);
  refreshNotifDot();
  showToast('All notifications read', '', 'info');
});

// ── Pending badge ─────────────────────────────────────────
function refreshPendBadge() {
  const n = DB.getAchievementsByStudent(student.id).filter(a => a.status === 'pending').length;
  const b = document.getElementById('pendBadge');
  b.style.display = n ? 'flex' : 'none';
  if (n) b.textContent = n;
}

// ── Navigation ────────────────────────────────────────────
const PAGES = { overview:renderOverview, academics:renderAcademics, achievements:renderAchievements, skills:renderSkills, profile:renderProfile };
function renderPage(page) { showLoading('mainArea'); setTimeout(() => (PAGES[page]||renderOverview)(), 80); }
setupNav(renderPage);

// ═══════════════════════════════════════════════════════
// OVERVIEW
// ═══════════════════════════════════════════════════════
function renderOverview() {
  const achievs  = DB.getAchievementsByStudent(student.id);
  const acRecs   = DB.getStudentAcademic(student.id);
  const readiness = DB.calcReadiness(student.id);
  const bd        = DB.getReadinessBreakdown(student.id);
  const weakAreas = DB.getWeakAreas(student.id);
  const risk      = DB.getRiskLevel(student.id);
  const verified  = achievs.filter(a => a.status === 'verified');
  const avgMark   = acRecs.length ? Math.round(acRecs.reduce((s,r)=>s+r.marks,0)/acRecs.length) : 0;
  const avgAtt    = acRecs.length ? Math.round(acRecs.reduce((s,r)=>s+r.attendance,0)/acRecs.length) : 0;

  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in">
    <div class="page-hdr-left"><h2>Dashboard</h2><p>Welcome back, ${esc(session.name.split(' ')[0])}!</p></div>
    <div class="page-actions"><button class="btn btn-primary" id="openUploadBtn">+ Upload Achievement</button></div>
  </div>
  <div class="grid-4 animate-in anim-delay-1">
    ${[
      ['Readiness Score', readiness+'/100', readinessColor(readiness), '⚡'],
      ['Verified', verified.length, 'var(--emerald)', '🏆'],
      ['Avg Marks', avgMark+'%', avgMark>=75?'var(--emerald)':avgMark>=60?'var(--cyan)':'var(--red)', '📊'],
      ['Attendance', avgAtt+'%', avgAtt>=75?'var(--emerald)':'var(--red)', '📅'],
    ].map(([l,v,c,i]) => `<div class="stat-card">
      <div class="stat-icon" style="background:${c}22">${i}</div>
      <div class="stat-label">${l}</div>
      <div class="stat-val" style="color:${c}">${v}</div>
    </div>`).join('')}
  </div>

  <div class="grid-2 mt-2 animate-in anim-delay-2">
    <!-- Readiness Breakdown -->
    <div class="card">
      <div class="card-title">⚡ Readiness Breakdown</div>
      ${[['Base', bd.base, 20], ['Achievements', bd.achievements, 25], ['Academics', bd.academics, 25], ['Attendance', bd.attendance, 15], ['Skill Diversity', bd.skills, 15]].map(([l,v,max]) => `
      <div style="margin-bottom:0.6rem">
        <div class="progress-label"><span>${l}</span><span style="color:var(--cyan)">${v}/${max}</span></div>
        ${progressBar(v, max)}
      </div>`).join('')}
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="text-sm text-muted">Total Score</span>
        <span style="font-family:var(--font-h);font-size:1.4rem;font-weight:800;color:${readinessColor(readiness)}">${readiness}/100</span>
      </div>
    </div>

    <!-- Risk + Weak Areas -->
    <div class="card">
      <div class="card-title">📊 Performance Prediction</div>
      <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.85rem">
        ${riskChip(risk)}
        <span class="text-xs text-muted">${risk==='low'?'Keep it up!':risk==='medium'?'Some areas need attention':'Immediate action needed'}</span>
      </div>
      ${weakAreas.length ? `
      <div class="text-xs text-muted mb-1" style="font-weight:600;text-transform:uppercase;letter-spacing:0.05em">⚠ Weak Areas</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Subject</th><th>Issue</th><th>Value</th><th>Target</th></tr></thead>
        <tbody>${weakAreas.map(w=>`<tr>
          <td><strong>${esc(w.subject)}</strong></td>
          <td>${w.type==='marks'?'Marks':'Attendance'}</td>
          <td style="color:${w.severity==='high'?'var(--red)':'var(--amber)'};font-weight:700">${w.value}%</td>
          <td class="text-xs text-muted">${w.threshold}%+</td>
        </tr>`).join('')}</tbody>
      </table></div>` : `<div class="empty-state" style="padding:1.5rem"><div class="ico">✅</div><p>No weak areas detected!</p></div>`}
    </div>
  </div>

  <!-- Recent achievements -->
  ${achievs.length ? `
  <div class="card mt-2 animate-in anim-delay-3">
    <div class="card-title">🏆 Recent Achievements</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Title</th><th>Type</th><th>Date</th><th>Status</th></tr></thead>
      <tbody>${achievs.slice(-5).reverse().map(a=>`<tr>
        <td><strong>${esc(a.title)}</strong><br><span class="text-xs text-muted">${esc(a.org)}</span></td>
        <td>${typeChip(a.type)}</td>
        <td class="text-xs">${a.date||'—'}</td>
        <td>${statusChip(a.status)}</td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>` : ''}`;

  animateBars();
  document.getElementById('openUploadBtn').addEventListener('click', () => openModal('uploadModal'));
}

// ═══════════════════════════════════════════════════════
// ACADEMICS
// ═══════════════════════════════════════════════════════
function renderAcademics() {
  const acRecs = DB.getStudentAcademic(student.id);
  const avgM   = acRecs.length ? Math.round(acRecs.reduce((s,r)=>s+r.marks,0)/acRecs.length) : 0;
  const avgA   = acRecs.length ? Math.round(acRecs.reduce((s,r)=>s+r.attendance,0)/acRecs.length) : 0;

  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>My Academics</h2><p>${acRecs.length} subject records</p></div></div>
  <div class="grid-2 animate-in anim-delay-1" style="margin-bottom:1rem">
    <div class="stat-card"><div class="stat-label">Average Marks</div><div class="stat-val" style="color:${avgM>=75?'var(--emerald)':avgM>=60?'var(--cyan)':'var(--red)'}">${avgM}%</div></div>
    <div class="stat-card"><div class="stat-label">Average Attendance</div><div class="stat-val" style="color:${avgA>=75?'var(--emerald)':'var(--red)'}">${avgA}%</div></div>
  </div>
  ${acRecs.length ? `
  <div class="card animate-in anim-delay-2">
    <div class="tbl-wrap"><table>
      <thead><tr><th>Subject</th><th>Semester</th><th>Marks</th><th>Quiz</th><th>Assignment</th><th>Attendance</th><th>Feedback</th></tr></thead>
      <tbody>${acRecs.map(r=>`<tr>
        <td><strong>${esc(r.subject)}</strong></td>
        <td class="text-xs">${esc(r.semester)||'—'}</td>
        <td><span style="font-weight:700;color:${r.marks>=75?'var(--emerald)':r.marks>=60?'var(--cyan)':'var(--red)'}">${r.marks}%</span></td>
        <td>${r.quiz||'—'}</td>
        <td>${r.assignment||'—'}</td>
        <td><span style="font-weight:600;color:${r.attendance>=75?'var(--emerald)':'var(--red)'}">${r.attendance}%</span></td>
        <td class="text-xs" style="color:var(--text2);max-width:200px">${esc(r.feedback||'—')}</td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>` : `<div class="card animate-in"><div class="empty-state"><div class="ico">📚</div><p>No academic records yet. Your teacher will add them.</p></div></div>`}`;
}

// ═══════════════════════════════════════════════════════
// ACHIEVEMENTS
// ═══════════════════════════════════════════════════════
function renderAchievements() {
  const achievs = DB.getAchievementsByStudent(student.id);
  refreshPendBadge();
  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in">
    <div class="page-hdr-left"><h2>My Achievements</h2><p>${achievs.length} total · ${achievs.filter(a=>a.status==='verified').length} verified</p></div>
    <div class="page-actions"><button class="btn btn-primary" id="openUploadBtn2">+ Upload Achievement</button></div>
  </div>
  <div class="grid-3 animate-in anim-delay-1">
    ${[['Total',achievs.length,'var(--cyan)'],['Verified',achievs.filter(a=>a.status==='verified').length,'var(--emerald)'],['Pending',achievs.filter(a=>a.status==='pending').length,'var(--amber)']].map(([l,v,c])=>`<div class="stat-card"><div class="stat-label">${l}</div><div class="stat-val" style="color:${c}">${v}</div></div>`).join('')}
  </div>
  <div class="card mt-2 animate-in anim-delay-2">
    ${achievs.length ? `<div class="tbl-wrap"><table>
      <thead><tr><th>Achievement</th><th>Type</th><th>Skills</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>
        ${achievs.slice().reverse().map(a=>`<tr>
          <td><strong>${esc(a.title)}</strong><br><span class="text-xs text-muted">${esc(a.org)} ${a.desc?'· '+esc(a.desc.slice(0,40)):''}</span></td>
          <td>${typeChip(a.type)}</td>
          <td><div class="skill-tags">${(a.skills||[]).map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('')}</div></td>
          <td class="text-xs">${a.date||'—'}</td>
          <td>${statusChip(a.status)}</td>
          <td>${a.status==='pending'?`<button class="btn btn-xs btn-danger del-ach" data-id="${esc(a.id)}">Delete</button>`:'<span class="text-xs text-muted">Locked</span>'}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>` : `<div class="empty-state"><div class="ico">🏆</div><p>No achievements yet.</p><button class="btn btn-primary mt-2" id="openUploadBtn3">Upload Your First Achievement</button></div>`}
  </div>`;

  document.getElementById('openUploadBtn2')?.addEventListener('click', () => openModal('uploadModal'));
  document.getElementById('openUploadBtn3')?.addEventListener('click', () => openModal('uploadModal'));
  document.querySelectorAll('.del-ach').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!confirm('Delete this pending achievement?')) return;
      try { DB.deleteAchievement(btn.dataset.id); showToast('Achievement removed'); renderAchievements(); }
      catch(e) { showToast(e.message,'','error'); }
    });
  });
}

// ═══════════════════════════════════════════════════════
// SKILLS
// ═══════════════════════════════════════════════════════
function renderSkills() {
  const raw      = DB.getRawSkills(student.id);
  const mapped   = DB.getMappedSkills(student.id);
  const readiness= DB.calcReadiness(student.id);
  const verified = DB.getAchievementsByStudent(student.id).filter(a=>a.status==='verified');

  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>Skill Profile</h2><p>AI-mapped from verified achievements</p></div></div>
  <div class="grid-2 animate-in anim-delay-1">
    <div class="card">
      <div class="card-title">⚡ Industry Readiness Score</div>
      <div class="ring-wrap" style="padding:1rem 0">
        <div class="ring-c" style="width:110px;height:110px">
          <svg width="110" height="110" viewBox="0 0 110 110">
            <circle cx="55" cy="55" r="44" fill="none" stroke="rgba(56,189,248,0.07)" stroke-width="8"/>
            <circle cx="55" cy="55" r="44" fill="none" stroke="url(#rg2)" stroke-width="8" stroke-linecap="round" stroke-dasharray="276" stroke-dashoffset="${Math.round(276-(readiness/100)*276)}"/>
            <defs><linearGradient id="rg2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#8B5CF6"/></linearGradient></defs>
          </svg>
          <div class="ring-inner"><span class="ring-val" style="font-size:1.6rem">${readiness}</span><span class="ring-lbl">/100</span></div>
        </div>
        <div class="text-xs text-muted" style="text-align:center">Based on academics, attendance & verified achievements</div>
      </div>
      <div class="divider"></div>
      <div class="text-xs text-muted mb-1">Raw skills from achievements:</div>
      <div class="skill-tags">${raw.map((s,i)=>`<span class="skill-tag ${['','violet','emerald','amber'][i%4]}">${esc(s)}</span>`).join('')||'<span class="text-xs text-muted">None yet</span>'}</div>
    </div>
    <div class="card">
      <div class="card-title">🧠 AI-Mapped Skills (${mapped.length})</div>
      ${mapped.length ? `
      <div class="skill-tags" style="gap:0.5rem">${mapped.map((s,i)=>`<span class="skill-tag ${['','violet','emerald','amber'][i%4]}" style="font-size:0.72rem;padding:0.28rem 0.7rem">${esc(s)}</span>`).join('')}</div>
      <div class="divider"></div>
      <div class="text-xs text-muted">Skills extracted from verified achievements. Upload more to grow your profile.</div>`
      : `<div class="empty-state"><div class="ico">🔬</div><p>No verified achievements yet. Skills appear after teacher verification.</p></div>`}
    </div>
  </div>
  ${verified.length ? `
  <div class="card mt-2 animate-in anim-delay-2">
    <div class="card-title">📋 Skill–Achievement Map</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Achievement</th><th>Skills Demonstrated</th><th>Status</th></tr></thead>
      <tbody>${verified.map(a=>`<tr>
        <td><strong>${esc(a.title)}</strong><br><span class="text-xs text-muted">${esc(a.org)}</span></td>
        <td><div class="skill-tags">${(a.skills||[]).map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('')}</div></td>
        <td><span class="status-verified">✓ Verified</span></td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>` : ''}`;
}

// ═══════════════════════════════════════════════════════
// PROFILE
// ═══════════════════════════════════════════════════════
function renderProfile() {
  const readiness = DB.calcReadiness(student.id);
  const mapped    = DB.getMappedSkills(student.id);
  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>My Profile</h2><p>Your public talent card</p></div></div>
  <div class="card animate-in anim-delay-1" style="max-width:600px">
    <div style="display:flex;gap:1.2rem;align-items:center;margin-bottom:1.2rem">
      <div class="avatar av-xl" style="background:linear-gradient(135deg,var(--cyan),var(--violet))">${getInitials(session.name)}</div>
      <div>
        <div style="font-family:var(--font-h);font-size:1.2rem;font-weight:800;margin-bottom:0.2rem">${esc(session.name)}</div>
        <div class="text-sm text-muted">${esc(student.dept)} · Year ${student.year} · ${esc(student.rollNo)}</div>
        <div style="margin-top:0.5rem"><span class="tb-badge badge-student">Student</span></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="grid-2" style="margin:0.75rem 0">
      <div><div class="text-xs text-muted mb-1">GPA</div><div style="font-family:var(--font-h);font-size:1.4rem;font-weight:800;color:var(--cyan)">${student.gpa}</div></div>
      <div><div class="text-xs text-muted mb-1">Readiness Score</div><div style="font-family:var(--font-h);font-size:1.4rem;font-weight:800;color:${readinessColor(readiness)}">${readiness}/100</div></div>
    </div>
    <div class="divider"></div>
    <div class="mb-1"><div class="text-xs text-muted">Email</div><div class="text-sm">${esc(session.email)}</div></div>
    ${student.phone   ? `<div class="mb-1"><div class="text-xs text-muted">Phone</div><div class="text-sm">${esc(student.phone)}</div></div>` : ''}
    ${student.linkedIn ? `<div class="mb-1"><div class="text-xs text-muted">LinkedIn</div><div class="text-sm" style="color:var(--cyan)">${esc(student.linkedIn)}</div></div>` : ''}
    ${student.githubUrl? `<div class="mb-1"><div class="text-xs text-muted">GitHub</div><div class="text-sm" style="color:var(--cyan)">${esc(student.githubUrl)}</div></div>` : ''}
    <div class="divider"></div>
    <div class="text-xs text-muted mb-1">Verified Skills</div>
    <div class="skill-tags">${mapped.slice(0,12).map((s,i)=>`<span class="skill-tag ${['','violet','emerald','amber'][i%4]}">${esc(s)}</span>`).join('')||'<span class="text-xs text-muted">No skills yet</span>'}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// UPLOAD MODAL
// ═══════════════════════════════════════════════════════
setupModal('uploadModal', 'closeUploadBtn');

document.getElementById('submitAchBtn').addEventListener('click', async () => {
  const btn = document.getElementById('submitAchBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  try {
    const ach = await asyncOp(() => DB.addAchievement({
      studentId: student.id,
      ownerId:   session.userId,
      type:      document.getElementById('aType').value,
      title:     document.getElementById('aTitle').value,
      org:       document.getElementById('aOrg').value,
      date:      document.getElementById('aDate').value,
      skills:    document.getElementById('aSkills').value.split(',').map(s=>s.trim()).filter(Boolean),
      desc:      document.getElementById('aDesc').value,
    }));
    DB.getTeachers().forEach(t => DB.addNotification({ userId:t.userId, type:'new_achievement', text:`${session.name} submitted: "${ach.title}"` }));
    showToast('Achievement submitted!', 'Waiting for teacher verification 🎓');
    closeModal('uploadModal');
    ['aTitle','aOrg','aSkills','aDesc'].forEach(id => document.getElementById(id).value = '');
    refreshPendBadge();
    renderAchievements();
  } catch(e) {
    showToast(e.message, '', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Submit for Verification';
  }
});

// ── INIT ─────────────────────────────────────────────────
refreshNotifDot();
refreshPendBadge();
renderPage('overview');
</script>
</body>
</html>
