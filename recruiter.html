<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CampusIQ — Recruiter Portal</title>
<script src="theme.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="theme.css">
</head>
<body>
<div id="toast-wrap"></div>
<div class="app-shell">
  <header class="topbar">
    <div class="tb-brand"><div class="tb-brand-icon">IQ</div>Campus<em style="color:var(--cyan);font-style:normal;font-family:var(--font-h)">IQ</em></div>
    <div class="tb-right">
      <span class="tb-badge badge-recruiter">Recruiter</span>
      <div class="tb-user"><div class="avatar av-sm" id="tbAvatar" style="background:linear-gradient(135deg,#10B981,#38BDF8)"></div><span id="tbName"></span></div>
      <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle light/dark"></button>
      <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </div>
  </header>
  <aside class="sidebar">
    <div class="sb-section">Talent Discovery</div>
    <div class="sb-item active" data-page="discover"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Discover Talent</div>
    <div class="sb-item" data-page="leaderboard"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Leaderboard</div>
    <div class="sb-item" data-page="skills"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Skill Map</div>
    <div class="sb-section">Jobs</div>
    <div class="sb-item" data-page="jobs"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>My Job Posts</div>
    <div class="sb-section">Research + Saved</div>
    <div class="sb-item" data-page="research"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>Research Pool</div>
    <div class="sb-item" data-page="saved"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>Saved Profiles <span class="sb-badge" id="savedBadge" style="display:none">0</span></div>
  </aside>
  <main class="main-area" id="mainArea"></main>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal-box" style="max-width:640px">
    <div class="modal-hdr"><span class="modal-title" id="pmTitle">Student Profile</span><button class="modal-close" id="closePmBtn">✕</button></div>
    <div id="pmBody" style="max-height:70vh;overflow-y:auto"></div>
  </div>
</div>

<!-- POST JOB MODAL -->
<div class="modal-overlay" id="jobModal">
  <div class="modal-box">
    <div class="modal-hdr"><span class="modal-title">📋 Post a Job</span><button class="modal-close" id="closeJobBtn">✕</button></div>
    <div class="form-row-2">
      <div class="form-group"><label>Job Title *</label><input class="form-control" id="jRole" placeholder="e.g. ML Engineer"></div>
      <div class="form-group"><label>Company *</label><input class="form-control" id="jCompany" placeholder="Your company"></div>
    </div>
    <div class="form-row-3">
      <div class="form-group"><label>Type</label><select class="form-control" id="jType"><option value="fulltime">Full-time</option><option value="internship">Internship</option><option value="contract">Contract</option></select></div>
      <div class="form-group"><label>CTC</label><input class="form-control" id="jCTC" placeholder="e.g. 15-20 LPA"></div>
      <div class="form-group"><label>Location</label><input class="form-control" id="jLoc" placeholder="Bangalore / Remote"></div>
    </div>
    <div class="form-row-2">
      <div class="form-group"><label>Deadline</label><input class="form-control" id="jDeadline" type="date"></div>
      <div class="form-group"><label>Required Skills (comma-separated)</label><input class="form-control" id="jSkills" placeholder="Python, ML, React"></div>
    </div>
    <div class="form-group"><label>Description</label><textarea class="form-control" id="jDesc" rows="2" placeholder="Role description…"></textarea></div>
    <button class="btn btn-primary w-full" id="saveJobBtn">Post Job</button>
  </div>
</div>

<script src="data.js"></script>
<script src="utils.js"></script>
<script>
'use strict';
seedIfEmpty();
const session   = Auth.guard('recruiter');
const recruiter = DB.getRecruiterByUserId(session.userId);
if (!recruiter) Auth.logout();

initTopbar(session);
document.getElementById('logoutBtn').addEventListener('click', () => Auth.logout());

// ── Saved badge ───────────────────────────────────────────
function refreshSavedBadge() {
  const saved = DB.getSaved(session.userId);
  const b     = document.getElementById('savedBadge');
  b.style.display = saved.length ? 'flex' : 'none';
  if (saved.length) b.textContent = saved.length;
}
refreshSavedBadge();

// ── Navigation ────────────────────────────────────────────
const PAGES = { discover:renderDiscover, leaderboard:renderLeaderboard, skills:renderSkills, jobs:renderJobs, research:renderResearch, saved:renderSaved };
function renderPage(p) { showLoading('mainArea'); setTimeout(()=>(PAGES[p]||renderDiscover)(), 80); }
setupNav(renderPage);

// ── Modals ────────────────────────────────────────────────
setupModal('profileModal', 'closePmBtn');
setupModal('jobModal',     'closeJobBtn');

// ── Helpers ───────────────────────────────────────────────
function enrichStudent(st) {
  const allAchs   = DB.getAchievements();
  const allAcad   = DB.getAcademic();
  const achievs   = allAchs.filter(a=>a.studentId===st.id&&a.status==='verified');
  const acRecs    = allAcad.filter(r=>r.studentId===st.id);
  const skills    = DB.getRawSkills(st.id);
  const readiness = DB.calcReadiness(st.id);
  const avgMark   = acRecs.length ? Math.round(acRecs.reduce((s,r)=>s+r.marks,0)/acRecs.length) : 0;
  const avgAtt    = acRecs.length ? Math.round(acRecs.reduce((s,r)=>s+r.attendance,0)/acRecs.length) : 0;
  return { ...st, achievs, acRecs, skills, readiness, avgMark, avgAtt };
}

function buildCard(st, idx, matchScore = null) {
  const e      = enrichStudent(st);
  const isSaved= DB.isSaved(session.userId, st.id);
  const g      = grad(idx);
  const rCol   = readinessColor(e.readiness);
  return `<div class="card animate-in">
    <div style="display:flex;align-items:flex-start;gap:0.85rem;margin-bottom:0.75rem">
      <div class="avatar av-lg" style="background:${g};flex-shrink:0">${getInitials(st.name)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-h);font-size:0.92rem;font-weight:800;color:var(--text)">${esc(st.name)}</div>
        <div class="text-xs text-muted">${esc(st.dept)} · Year ${st.year} · GPA ${st.gpa}</div>
        <div style="margin-top:0.3rem;display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap">
          <span style="font-family:var(--font-h);font-size:1.15rem;font-weight:800;color:${rCol}">${e.readiness}</span>
          <span class="text-xs text-muted">/100</span>
          <span class="chip chip-emerald">${e.achievs.length} verified</span>
          ${matchScore!==null ? `<span class="chip chip-violet">🎯 ${matchScore}% match</span>` : ''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:0.3rem;align-items:flex-end;flex-shrink:0">
        <button class="btn btn-sm ${isSaved?'btn-violet':'btn-secondary'} save-btn" data-sid="${esc(st.id)}">${isSaved?'★ Saved':'☆ Save'}</button>
        <button class="btn btn-sm btn-primary view-profile" data-sid="${esc(st.id)}">View Profile</button>
      </div>
    </div>
    <div style="display:flex;gap:1.5rem;margin-bottom:0.6rem;flex-wrap:wrap">
      ${[['Avg Marks',e.avgMark+'%',e.avgMark>=75?'var(--emerald)':e.avgMark>=60?'var(--cyan)':'var(--red)'],['Attendance',e.avgAtt+'%',e.avgAtt>=75?'var(--emerald)':'var(--red)'],['Achievements',e.achievs.length,'var(--violet)']].map(([l,v,c])=>`<div><div class="text-xs text-muted">${l}</div><div style="font-weight:700;font-size:0.85rem;color:${c}">${v}</div></div>`).join('')}
    </div>
    <div class="skill-tags">${e.skills.slice(0,8).map((s,i)=>`<span class="skill-tag ${['','violet','emerald','amber'][i%4]}">${esc(s)}</span>`).join('')||'<span class="text-xs text-muted">No verified skills</span>'}</div>
  </div>`;
}

function attachCardEvents(container) {
  container.querySelectorAll('.save-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const saved = DB.toggleSaved(session.userId, btn.dataset.sid);
      showToast(saved ? 'Profile saved ★' : 'Removed from saved');
      refreshSavedBadge();
      btn.className = `btn btn-sm ${saved?'btn-violet':'btn-secondary'} save-btn`;
      btn.textContent = saved ? '★ Saved' : '☆ Save';
    });
  });
  container.querySelectorAll('.view-profile').forEach(btn => {
    btn.addEventListener('click', () => openProfile(btn.dataset.sid));
  });
}

// ═══════════════════════════════════════════════════════
// DISCOVER
// ═══════════════════════════════════════════════════════
let _discoverFilters = { q:'', dept:'all', minScore:0, skillFilter:'', jobId:'' };

function renderDiscover() {
  const students = DB.getStudents();
  const depts    = [...new Set(students.map(s=>s.dept))].sort();
  const f        = _discoverFilters;

  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in">
    <div class="page-hdr-left"><h2>Discover Talent</h2><p>${students.length} student profiles</p></div>
  </div>
  <div class="card animate-in anim-delay-1" style="margin-bottom:1rem">
    <div style="display:flex;gap:0.6rem;flex-wrap:wrap;align-items:center">
      <div class="search-wrap" style="flex:1;min-width:200px">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchQ" placeholder="Search name, skill, achievement…" value="${esc(f.q)}" oninput="_discoverFilters.q=this.value;applyFilters()">
      </div>
      <select class="form-control" style="width:auto" id="deptSel" onchange="_discoverFilters.dept=this.value;applyFilters()">
        <option value="all">All Depts</option>
        ${depts.map(d=>`<option value="${esc(d)}" ${f.dept===d?'selected':''}>${esc(d)}</option>`).join('')}
      </select>
      <select class="form-control" style="width:auto" id="minSel" onchange="_discoverFilters.minScore=parseInt(this.value);applyFilters()">
        <option value="0" ${f.minScore===0?'selected':''}>Any Readiness</option>
        <option value="60" ${f.minScore===60?'selected':''}>60+</option>
        <option value="75" ${f.minScore===75?'selected':''}>75+</option>
        <option value="85" ${f.minScore===85?'selected':''}>85+</option>
      </select>
      <select class="form-control" style="width:auto" id="jobMatch" onchange="_discoverFilters.jobId=this.value;applyFilters()">
        <option value="">Any Job</option>
        ${DB.getJobsByRecruiter(session.userId).filter(j=>j.status==='open').map(j=>`<option value="${esc(j.id)}" ${f.jobId===j.id?'selected':''}>Match: ${esc(j.role)}</option>`).join('')}
      </select>
      ${f.q||f.dept!=='all'||f.minScore>0||f.jobId?`<button class="btn btn-secondary btn-sm" id="clearFiltersBtn">Clear</button>`:''}
    </div>
  </div>
  <div id="studentGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:0.85rem"></div>`;

  document.getElementById('clearFiltersBtn')?.addEventListener('click', () => {
    _discoverFilters = { q:'', dept:'all', minScore:0, skillFilter:'', jobId:'' };
    renderDiscover();
  });
  applyFilters();
}

function applyFilters() {
  const f       = _discoverFilters;
  const job     = f.jobId ? DB.getJobById(f.jobId) : null;
  const reqSkills = job ? job.skills : [];

  const filtered = DB.rankStudents(reqSkills).filter(st => {
    if (st.readiness < f.minScore) return false;
    if (f.dept !== 'all' && st.dept !== f.dept) return false;
    if (!f.q) return true;
    const q     = f.q.toLowerCase();
    const skills= DB.getRawSkills(st.id).join(' ').toLowerCase();
    const achs  = DB.getAchievementsByStudent(st.id).map(a=>a.title+' '+(a.org||'')).join(' ').toLowerCase();
    return st.name.toLowerCase().includes(q) || skills.includes(q) || achs.includes(q) || st.dept.toLowerCase().includes(q);
  });

  const grid = document.getElementById('studentGrid');
  if (!grid) return;
  if (!filtered.length) {
    grid.innerHTML = '<div class="card" style="grid-column:span 2"><div class="empty-state"><div class="ico">🔍</div><p>No students match your filters.</p></div></div>';
    return;
  }
  grid.innerHTML = filtered.map((st,i) => buildCard(st, i, reqSkills.length ? st.matchScore : null)).join('');
  attachCardEvents(grid);
}

// ═══════════════════════════════════════════════════════
// PROFILE MODAL
// ═══════════════════════════════════════════════════════
function openProfile(sid) {
  const st = DB.getStudentById(sid);
  if (!st) return;
  const e       = enrichStudent(st);
  const isSaved = DB.isSaved(session.userId, sid);
  const bd      = DB.getReadinessBreakdown(sid);
  const rCol    = readinessColor(e.readiness);
  const mapped  = DB.getMappedSkills(sid);

  document.getElementById('pmTitle').textContent = `${st.name} — Full Profile`;
  document.getElementById('pmBody').innerHTML = `
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem;padding-bottom:1rem;border-bottom:1px solid var(--b2)">
      <div class="avatar av-xl" style="background:${grad(DB.getStudents().findIndex(s=>s.id===sid))}">${getInitials(st.name)}</div>
      <div style="flex:1">
        <div style="font-family:var(--font-h);font-size:1.1rem;font-weight:800">${esc(st.name)}</div>
        <div class="text-xs text-muted">${esc(st.dept)} · Year ${st.year} · ${esc(st.rollNo)}</div>
        <div style="margin-top:0.4rem;display:flex;gap:0.4rem;align-items:center">
          <span style="font-family:var(--font-h);font-size:1.5rem;font-weight:800;color:${rCol}">${e.readiness}</span>
          <span class="text-xs text-muted">/100 Industry Readiness</span>
        </div>
      </div>
    </div>
    <!-- Stats -->
    <div class="grid-3" style="margin-bottom:1rem">
      ${[['GPA',st.gpa,'var(--cyan)'],['Avg Marks',e.avgMark+'%',e.avgMark>=75?'var(--emerald)':'var(--amber)'],['Attendance',e.avgAtt+'%',e.avgAtt>=75?'var(--emerald)':'var(--red)']].map(([l,v,c])=>`
      <div style="text-align:center;padding:0.7rem;background:var(--b3);border-radius:8px;border:1px solid var(--b2)">
        <div class="text-xs text-muted">${l}</div>
        <div style="font-family:var(--font-h);font-size:1.15rem;font-weight:800;color:${c};margin-top:0.2rem">${v}</div>
      </div>`).join('')}
    </div>
    <!-- Readiness breakdown -->
    <div style="margin-bottom:1rem">
      <div class="card-title">⚡ Readiness Breakdown</div>
      ${[['Base',bd.base,20],['Achievements',bd.achievements,25],['Academics',bd.academics,25],['Attendance',bd.attendance,15],['Skill Diversity',bd.skills,15]].map(([l,v,max])=>`
      <div style="margin-bottom:0.45rem">
        <div class="progress-label" style="font-size:0.72rem"><span>${l}</span><span>${v}/${max}</span></div>
        ${progressBar(v, max)}
      </div>`).join('')}
    </div>
    <!-- Skills -->
    ${mapped.length?`<div style="margin-bottom:1rem">
      <div class="card-title">🧠 Verified Skills</div>
      <div class="skill-tags">${mapped.slice(0,16).map((s,i)=>`<span class="skill-tag ${['','violet','emerald','amber'][i%4]}">${esc(s)}</span>`).join('')}</div>
    </div>`:''}
    <!-- Achievements -->
    ${e.achievs.length?`<div style="margin-bottom:1rem">
      <div class="card-title">🏆 Verified Achievements (${e.achievs.length})</div>
      ${e.achievs.map(a=>`<div style="padding:0.5rem 0.65rem;background:var(--b3);border-radius:7px;border:1px solid var(--b2);margin-bottom:0.4rem">
        <div style="font-size:0.82rem;font-weight:600">${esc(a.title)}</div>
        <div class="text-xs text-muted">${esc(a.org||'')} · ${a.date||'—'}</div>
        ${(a.skills||[]).length?`<div class="skill-tags" style="margin-top:0.3rem">${a.skills.map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('')}</div>`:''}
      </div>`).join('')}
    </div>`:''}
    <!-- Academics -->
    ${e.acRecs.length?`<div style="margin-bottom:1rem">
      <div class="card-title">📚 Academic Snapshot</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Subject</th><th>Sem</th><th>Marks</th><th>Attendance</th></tr></thead>
        <tbody>${e.acRecs.map(r=>`<tr>
          <td>${esc(r.subject)}</td>
          <td class="text-xs">${esc(r.semester)}</td>
          <td style="color:${r.marks>=75?'var(--emerald)':r.marks>=60?'var(--cyan)':'var(--red)'};font-weight:600">${r.marks}%</td>
          <td style="color:${r.attendance>=75?'var(--emerald)':'var(--red)'};font-weight:600">${r.attendance}%</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`:''}
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
      <button class="btn btn-primary" style="flex:1" id="pmExpressBtn">📧 Express Interest</button>
      <button class="btn ${isSaved?'btn-violet':'btn-secondary'}" id="pmSaveBtn" data-sid="${esc(sid)}">${isSaved?'★ Saved':'☆ Save'}</button>
    </div>`;

  animateBars(document.getElementById('pmBody'));
  openModal('profileModal');

  document.getElementById('pmExpressBtn').addEventListener('click', () => {
    showToast('Interest sent! 📧', 'Institution will forward your message.');
    closeModal('profileModal');
  });
  document.getElementById('pmSaveBtn').addEventListener('click', e => {
    const saved = DB.toggleSaved(session.userId, sid);
    e.target.className = `btn ${saved?'btn-violet':'btn-secondary'}`;
    e.target.textContent = saved ? '★ Saved' : '☆ Save';
    showToast(saved ? 'Profile saved ★' : 'Removed from saved');
    refreshSavedBadge();
  });
}
window.openProfile = openProfile;

// ═══════════════════════════════════════════════════════
// LEADERBOARD
// ═══════════════════════════════════════════════════════
function renderLeaderboard() {
  const ranked  = DB.rankStudents();
  const MEDALS  = ['🥇','🥈','🥉'];

  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>🏆 Talent Leaderboard</h2><p>Ranked by Industry Readiness Score · ${ranked.length} students</p></div></div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-bottom:1.25rem" class="animate-in anim-delay-1">
    ${ranked.slice(0,3).map((st,i)=>{
      const rCol = readinessColor(st.readiness);
      const border= i===0?'rgba(245,158,11,0.5)':i===1?'rgba(192,192,192,0.4)':'rgba(205,127,50,0.4)';
      const skills= DB.getRawSkills(st.id);
      return `<div class="card" style="text-align:center;padding:1.2rem 1rem;border-color:${border}">
        <div style="font-size:2rem;margin-bottom:0.4rem">${MEDALS[i]}</div>
        <div class="avatar av-lg" style="background:${grad(i)};margin:0 auto 0.5rem">${getInitials(st.name)}</div>
        <div style="font-family:var(--font-h);font-weight:800;font-size:0.88rem">${esc(st.name)}</div>
        <div class="text-xs text-muted" style="margin-bottom:0.3rem">${esc(st.dept)} · Y${st.year}</div>
        <div style="font-family:var(--font-h);font-size:1.7rem;font-weight:800;color:${rCol}">${st.readiness}</div>
        <div class="text-xs text-muted" style="margin-bottom:0.4rem">readiness</div>
        <div class="skill-tags" style="justify-content:center">${skills.slice(0,3).map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('')}</div>
        <button class="btn btn-primary btn-sm w-full" style="margin-top:0.6rem" data-sid="${esc(st.id)}">View Profile</button>
      </div>`;
    }).join('')}
  </div>
  <div class="card animate-in anim-delay-2">
    <div class="card-title">📋 Full Rankings</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>#</th><th>Student</th><th>Dept</th><th>Readiness</th><th>Verified</th><th>GPA</th><th>Top Skills</th><th>Action</th></tr></thead>
      <tbody>${ranked.map((st,i)=>{
        const rCol = readinessColor(st.readiness);
        const skills= DB.getRawSkills(st.id);
        const v     = DB.getAchievements().filter(a=>a.studentId===st.id&&a.status==='verified').length;
        return `<tr>
          <td style="font-weight:800;color:var(--muted)">${i<3?MEDALS[i]:'#'+(i+1)}</td>
          <td><div style="display:flex;align-items:center;gap:0.4rem"><div class="avatar av-sm" style="background:${grad(i)};flex-shrink:0">${getInitials(st.name)}</div><strong>${esc(st.name)}</strong></div></td>
          <td><span class="chip chip-cyan">${esc(st.dept)}</span></td>
          <td><span style="font-family:var(--font-h);font-weight:800;color:${rCol}">${st.readiness}</span></td>
          <td><span class="chip chip-emerald">${v}</span></td>
          <td style="color:var(--cyan);font-weight:600">${st.gpa}</td>
          <td><div class="skill-tags">${skills.slice(0,3).map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('')||'<span class="text-xs text-muted">—</span>'}</div></td>
          <td><button class="btn btn-xs btn-primary view-profile" data-sid="${esc(st.id)}">View</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;

  document.querySelectorAll('.view-profile, [data-sid]').forEach(btn => {
    btn.addEventListener('click', () => openProfile(btn.dataset.sid));
  });
}

// ═══════════════════════════════════════════════════════
// SKILL MAP
// ═══════════════════════════════════════════════════════
function renderSkills() {
  const achievs   = DB.getAchievements().filter(a=>a.status==='verified');
  const freq      = {};
  achievs.forEach(a=>(a.skills||[]).forEach(s=>{freq[s]=(freq[s]||0)+1;}));
  const sorted    = Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  const students  = DB.getStudents();
  const deptDist  = {};
  students.forEach(st=>{deptDist[st.dept]=(deptDist[st.dept]||0)+1;});
  const allAchs   = DB.getAchievements(), allAcad = DB.getAcademic();
  let high=0,med=0,low=0;
  students.forEach(st=>{const r=DB.calcReadiness(st.id);if(r>=80)high++;else if(r>=60)med++;else low++;});

  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>Campus Skill Map</h2><p>Intelligence from ${achievs.length} verified achievements</p></div></div>
  <div class="grid-2 animate-in anim-delay-1">
    <div class="card">
      <div class="card-title">🔥 Top Skills in Demand</div>
      ${sorted.slice(0,10).map(([skill,count],i)=>`<div style="margin-bottom:0.6rem">
        <div class="progress-label"><span style="font-size:0.78rem">${esc(skill)}</span><span style="font-size:0.78rem;font-weight:700;color:var(--cyan)">${count}</span></div>
        ${progressBar(count, sorted[0]?.[1]||1, ['linear-gradient(90deg,var(--cyan),var(--violet))','linear-gradient(90deg,var(--emerald),var(--cyan))','linear-gradient(90deg,var(--amber),var(--emerald))','linear-gradient(90deg,var(--pink),var(--violet))'][i%4])}
      </div>`).join('')||'<div class="text-xs text-muted">No verified skills yet</div>'}
    </div>
    <div style="display:flex;flex-direction:column;gap:0.85rem">
      <div class="card">
        <div class="card-title">📊 Readiness Distribution</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem">
          ${[['🟢 High','80+',high,'var(--emerald)'],['🟡 Med','60–79',med,'var(--amber)'],['🔴 Low','<60',low,'var(--red)']].map(([l,r,v,c])=>`
          <div style="text-align:center;background:var(--b3);border-radius:8px;padding:0.65rem 0.3rem">
            <div class="text-xs text-muted">${l}</div><div class="text-xs text-muted">${r}</div>
            <div style="font-family:var(--font-h);font-size:1.4rem;font-weight:800;color:${c}">${v}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-title">🏫 By Department</div>
        ${Object.entries(deptDist).map(([dept,count])=>`<div style="margin-bottom:0.45rem">
          <div class="progress-label"><span>${esc(dept)}</span><span>${count}</span></div>
          ${progressBar(count, students.length, 'linear-gradient(90deg,var(--cyan),var(--violet))')}
        </div>`).join('')}
      </div>
    </div>
  </div>
  <div class="card mt-2 animate-in anim-delay-2">
    <div class="card-title">🧩 All Verified Skills (${sorted.length})</div>
    <div class="skill-tags">${sorted.map(([s,c],i)=>`<span class="skill-tag ${['','violet','emerald','amber'][i%4]}" style="font-size:${Math.min(0.62+c*0.06,0.9)}rem" title="${c} students">${esc(s)} <span style="opacity:0.55;font-size:0.58rem">${c}</span></span>`).join('')||'<span class="text-xs text-muted">None</span>'}</div>
    <div class="text-xs text-muted" style="margin-top:0.5rem">Sizes reflect frequency · Verified achievements only</div>
  </div>`;
  animateBars();
}

// ═══════════════════════════════════════════════════════
// MY JOBS
// ═══════════════════════════════════════════════════════
function renderJobs() {
  const jobs = DB.getJobsByRecruiter(session.userId);
  document.getElementById('mainArea').innerHTML = `
  <div class="page-hdr animate-in">
    <div class="page-hdr-left"><h2>My Job Posts (${jobs.length})</h2></div>
    <div class="page-actions"><button class="btn btn-primary" id="postJobBtn">+ Post Job</button></div>
  </div>
  ${jobs.length?`<div style="display:flex;flex-direction:column;gap:0.75rem animate-in anim-delay-1">
    ${jobs.map(j=>`<div class="card animate-in">
      <div style="display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap">
        <div style="flex:1">
          <div style="font-family:var(--font-h);font-size:0.9rem;font-weight:800">${esc(j.role)}</div>
          <div class="text-xs text-muted">${esc(j.company)} · ${esc(j.location)} · ${esc(j.ctc)} · ${j.type}</div>
          <div class="skill-tags mt-1">${(j.skills||[]).map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('')}</div>
          ${j.desc?`<div class="text-sm" style="color:var(--text2);margin-top:0.3rem">${esc(j.desc)}</div>`:''}
          <div class="text-xs text-muted mt-1">Deadline: ${j.deadline||'—'}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.3rem;flex-shrink:0">
          <span class="chip ${j.status==='open'?'chip-emerald':'chip-gray'}">${j.status==='open'?'🟢 Open':'Closed'}</span>
          <div style="display:flex;gap:0.3rem;margin-top:auto">
            ${j.status==='open'?`<button class="btn btn-xs btn-secondary match-job" data-jid="${esc(j.id)}" data-jrole="${esc(j.role)}">Match Talent</button>
            <button class="btn btn-xs btn-danger close-job" data-jid="${esc(j.id)}">Close</button>`:''}
          </div>
        </div>
      </div>
    </div>`).join('')}
  </div>` : `<div class="card animate-in"><div class="empty-state"><div class="ico">💼</div><p>No job posts yet. Post your first role!</p></div></div>`}`;

  document.getElementById('postJobBtn').addEventListener('click', () => openModal('jobModal'));
  document.querySelectorAll('.close-job').forEach(btn => btn.addEventListener('click', () => {
    if (!confirm('Close this job posting?')) return;
    DB.closeJob(btn.dataset.jid); showToast('Job closed'); renderJobs();
  }));
  document.querySelectorAll('.match-job').forEach(btn => btn.addEventListener('click', () => {
    _discoverFilters.jobId = btn.dataset.jid;
    document.querySelector('[data-page="discover"]').click();
    showToast(`Showing talent matched for: ${btn.dataset.jrole}`, '', 'info');
  }));
}

document.getElementById('saveJobBtn').addEventListener('click', async () => {
  const btn = document.getElementById('saveJobBtn');
  btn.disabled = true; btn.textContent = 'Posting…';
  try {
    await asyncOp(() => DB.addJob({
      recruiterId: session.userId,
      company:     recruiter.company || DB.getUserById(session.userId)?.name || session.name,
      role:        document.getElementById('jRole').value,
      type:        document.getElementById('jType').value,
      ctc:         document.getElementById('jCTC').value,
      location:    document.getElementById('jLoc').value,
      deadline:    document.getElementById('jDeadline').value,
      skills:      document.getElementById('jSkills').value.split(',').map(s=>s.trim()).filter(Boolean),
      desc:        document.getElementById('jDesc').value,
    }));
    showToast('Job posted! ✓');
    closeModal('jobModal');
    ['jRole','jCTC','jLoc','jDeadline','jSkills','jDesc'].forEach(id=>document.getElementById(id).value='');
    renderJobs();
  } catch(e) { showToast(e.message,'','error'); }
  finally { btn.disabled=false; btn.textContent='Post Job'; }
});

  <div style="display:flex;flex-direction:column;gap:0.75rem">
    ${research.map(r=>{
      const t=DB.getTeachers().find(x=>x.id===r.teacherId);
      return `<div class="card animate-in">
        <div style="display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap">
          <div style="flex:1">
            <div style="font-family:var(--font-h);font-size:0.9rem;font-weight:800;margin-bottom:0.3rem">${esc(r.title)}</div>
            <div class="text-xs text-muted">by ${esc(t?.name||'Unknown')} · ${esc(r.journal)} · ${r.year}</div>
            ${r.doi?`<div class="text-xs" style="color:var(--cyan)">DOI: ${esc(r.doi)}</div>`:''}
            ${r.abstract?`<div class="text-sm" style="color:var(--text2);margin-top:0.35rem;line-height:1.6">${esc(r.abstract)}</div>`:''}
            ${r.coAuthors?.length?`<div class="text-xs text-muted mt-1">Co-authors: ${r.coAuthors.map(esc).join(', ')}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.3rem;flex-shrink:0">
            <span class="status-verified">✓ Published</span>
            ${r.citations?`<span class="chip chip-cyan">📖 ${r.citations}</span>`:''}
          </div>

}
