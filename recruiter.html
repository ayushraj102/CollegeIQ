<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CampusIQ — Recruiter Portal</title>
<script src="theme.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="theme.css">
</head>
<body>
<div id="toast-wrap"></div>
<div class="app-shell">
  <header class="topbar">
    <div class="tb-brand"><div class="tb-brand-icon">IQ</div>Campus<em style="color:var(--cyan);font-style:normal;font-family:var(--font-h)">IQ</em></div>
    <div class="tb-right">
      <span class="tb-badge badge-recruiter">Recruiter</span>
      <div class="tb-user"><div class="avatar av-sm" id="tbAvatar"></div><span id="tbName"></span></div>
      <button id="theme-toggle" onclick="toggleTheme()"></button>
      <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </div>
  </header>
  <aside class="sidebar">
    <div class="sb-item active" data-page="discover">Discover Talent</div>
    <div class="sb-item" data-page="jobs">My Jobs</div>
  </aside>
  <main class="main-area" id="mainArea"></main>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal-box" style="max-width: 650px">
    <div class="modal-hdr"><span class="modal-title" id="pmName">Student Profile</span><button class="modal-close" id="closePmBtn">✕</button></div>
    <div id="pmContent"></div>
  </div>
</div>

<script src="db.js"></script>
<script src="utils.js"></script>
<script src="auth.js"></script>
<script>
'use strict';

/**
 * We wrap the initialization in a window.onload listener to ensure 
 * that external scripts like auth.js are fully loaded and Auth is defined.
 */
window.onload = function() {
  
  // ─── CANVAS PREVIEW FALLBACK ───
  // In isolated environments (like this Canvas), external files (auth.js, db.js) fail to load 
  // because they are separate files. We inject mocks here so you can preview the UI. 
  // This won't affect your GitHub deployment where the real files will load successfully.
  if (typeof Auth === 'undefined') {
    console.warn("External dependencies not found. Injecting preview mocks for Canvas...");
    window.Auth = {
      guard: () => ({ name: 'Nisha Patel', role: 'recruiter', userId: 'r1' }),
      logout: () => alert('Logout clicked')
    };
    window.DB = {
      getStudents: () => [
        { id: 'st1', name: 'Arjun Rao', dept: 'Computer Science', year: 3 },
        { id: 'st2', name: 'Priya Sharma', dept: 'Information Tech', year: 4 }
      ],
      getStudentById: (id) => ({ id, name: id === 'st1' ? 'Arjun Rao' : 'Priya Sharma', dept: 'Computer Science', year: 3 }),
      getRawSkills: () => ['React', 'JavaScript', 'Machine Learning', 'Python']
    };
    window.esc = (s) => s || '';
    window.showLoading = (id) => { 
      const el = document.getElementById(id); 
      if (el) el.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--muted)">Loading...</div>'; 
    };
    window.setupNav = (cb) => {
      document.querySelectorAll('.sb-item[data-page]').forEach(el => {
        el.addEventListener('click', () => {
          document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
          el.classList.add('active');
          cb(el.dataset.page);
        });
      });
    };
    window.initTopbar = () => {
      const n = document.getElementById('tbName'), a = document.getElementById('tbAvatar');
      if (n) n.textContent = 'Nisha Patel';
      if (a) a.textContent = 'NP';
    };
    window.setupModal = (id, closeId) => {
      const m = document.getElementById(id), c = document.getElementById(closeId);
      if (c && m) {
        c.onclick = () => m.classList.remove('open');
        m.onclick = (e) => { if (e.target === m) m.classList.remove('open'); };
      }
    };
    window.callGemini = async () => "1. How do you manage state in React?\n2. Explain closures in JavaScript.\n3. Discuss the bias-variance tradeoff in ML.";
    if (typeof toggleTheme === 'undefined') {
      window.toggleTheme = () => document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }
  }

  // Ensure the database is initialized with seed data if using the old data.js logic
  if (typeof seedIfEmpty === 'function') {
    seedIfEmpty();
  }

  const session = Auth.guard('recruiter');
  if (!session) return; // guard handles redirection

  initTopbar(session);
  document.getElementById('logoutBtn').addEventListener('click', () => Auth.logout());

  const PAGES = { 
    discover: renderDiscover, 
    jobs: () => {
      document.getElementById('mainArea').innerHTML = `
        <div class="page-hdr"><h2>My Jobs</h2></div>
        <div class="card"><p class="text-muted">Job management features coming soon.</p></div>
      `;
    } 
  };

  function renderPage(p) { 
    showLoading('mainArea'); 
    setTimeout(() => (PAGES[p] || renderDiscover)(), 80); 
  }
  
  setupNav(renderPage);

  function renderDiscover() {
    const students = DB.getStudents();
    document.getElementById('mainArea').innerHTML = `
      <div class="page-hdr"><h2>Discover Talent</h2></div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem" id="studentGrid">
        ${students.map(st => `
          <div class="card animate-in">
            <h4>${esc(st.name)}</h4>
            <p class="text-xs text-muted">${esc(st.dept)} · Year ${st.year}</p>
            <div class="divider"></div>
            <button class="btn btn-primary btn-sm w-full view-profile" data-id="${st.id}">View Full Profile</button>
          </div>
        `).join('')}
      </div>
    `;

    document.querySelectorAll('.view-profile').forEach(btn => {
      btn.onclick = () => showProfile(btn.dataset.id);
    });
  }

  function showProfile(sid) {
    const st = DB.getStudentById(sid);
    const skills = DB.getRawSkills ? DB.getRawSkills(sid) : [];
    const content = document.getElementById('pmContent');
    
    content.innerHTML = `
      <div style="margin-bottom: 1.5rem">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem">
          <label class="text-xs text-muted">Skill Map</label>
          <button class="btn btn-xs btn-ai" id="aiInterviewBtn">✨ Generate AI Interview Questions</button>
        </div>
        <div class="skill-tags">${skills.length > 0 ? skills.map(s => `<span class="skill-tag">${esc(s)}</span>`).join('') : '<span class="text-muted">No verified skills</span>'}</div>
        <div id="aiInterviewBox"></div>
      </div>
    `;
    
    document.getElementById('profileModal').classList.add('open');

    document.getElementById('aiInterviewBtn').onclick = async () => {
      const btn = document.getElementById('aiInterviewBtn');
      const box = document.getElementById('aiInterviewBox');
      
      btn.disabled = true;
      btn.textContent = '✨ Thinking...';
      box.innerHTML = `<div class="ai-response-box">Crafting technical questions for ${esc(st.name)}...</div>`;

      try {
        const prompt = `Candidate: ${st.name}. Skills: ${skills.join(', ')}. 
        Generate 5 challenging technical interview questions tailored to these specific skills. 
        Help the recruiter evaluate their real-world expertise.`;
        
        const questions = await callGemini(prompt, "You are an expert technical interviewer at a top tech company.");
        box.innerHTML = `<div class="ai-response-box">${questions}</div>`;
      } catch(e) {
        box.innerHTML = `<div class="ai-response-box" style="color:var(--red)">AI Interview Assistant unavailable. Please check your connection.</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '✨ Refresh Questions';
      }
    };
  }

  // Initial modal setup
  setupModal('profileModal', 'closePmBtn');
  // Set initial view
  renderPage('discover');
};
</script>
</body>
</html>
