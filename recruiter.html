<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CampusIQ — Recruiter Portal</title>
<script src="theme.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="theme.css">
</head>
<body>
<div id="toast-wrap"></div>
<div class="app-shell">
  <header class="topbar">
    <div class="tb-brand"><div class="tb-brand-icon">IQ</div>Campus<em style="color:var(--cyan);font-style:normal;font-family:var(--font-h)">IQ</em></div>
    <div class="tb-right">
      <span class="tb-badge badge-recruiter">Recruiter</span>
      <div class="tb-user"><div class="avatar av-sm" id="tbAvatar" style="background:linear-gradient(135deg,#10B981,#38BDF8)"></div><span id="tbName"></span></div>
      <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle light/dark mode"></button></button>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </header>
  <aside class="sidebar">
    <div class="sb-section">Talent Discovery</div>
    <div class="sb-item active" data-page="discover" onclick="nav(this)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Discover Talent</div>
    <div class="sb-item" data-page="leaderboard" onclick="nav(this)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Leaderboard</div>
    <div class="sb-item" data-page="skills" onclick="nav(this)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Skill Map</div>
    <div class="sb-item" data-page="research" onclick="nav(this)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>Research Pool</div>
    <div class="sb-item" data-page="saved" onclick="nav(this)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>Saved Profiles <span class="sb-badge" id="savedBadge" style="display:none">0</span></div>
  </aside>
  <main class="main-area" id="mainArea"></main>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal-box" style="max-width:640px">
    <div class="modal-hdr"><span class="modal-title" id="pmTitle">Student Profile</span><button class="modal-close" onclick="document.getElementById('profileModal').classList.remove('open')">✕</button></div>
    <div id="pmBody"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
seedIfEmpty();
const session=DB.getSession();
if(!session||session.role!=='recruiter'){window.location.href='index.html';}
const initials=session.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
document.getElementById('tbName').textContent=session.name;
document.getElementById('tbAvatar').textContent=initials;
function logout(){DB.clearSession();window.location.href='index.html';}
function nav(el){document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));el.classList.add('active');renderPage(el.dataset.page);}
function renderPage(p){const m={discover:renderDiscover,leaderboard:renderLeaderboard,skills:renderSkills,research:renderResearch,saved:renderSaved};(m[p]||renderDiscover)();}
renderPage('discover');
function toast(msg,sub='',type='ok'){const w=document.getElementById('toast-wrap');const t=document.createElement('div');t.className=`toast ${type==='error'?'error':''}`;const ico=type==='ok'?'✅':type==='error'?'❌':'ℹ️';const ic=type==='ok'?'toast-ico-ok':type==='error'?'toast-ico-err':'toast-ico-info';t.innerHTML=`<div class="toast-ico ${ic}">${ico}</div><div><div class="toast-t">${msg}</div>${sub?`<div class="toast-s">${sub}</div>`:''}</div>`;w.appendChild(t);requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('in')));setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),400);},4000);}

// Saved profiles (session-only)
let saved = JSON.parse(sessionStorage.getItem('rec_saved')||'[]');
function toggleSave(sid){if(saved.includes(sid)){saved=saved.filter(x=>x!==sid);toast('Removed from saved');}else{saved.push(sid);toast('Profile saved','You can view it in Saved Profiles');}sessionStorage.setItem('rec_saved',JSON.stringify(saved));const b=document.getElementById('savedBadge');if(saved.length){b.style.display='flex';b.textContent=saved.length;}else b.style.display='none';}

const GRADS=['linear-gradient(135deg,#38BDF8,#8B5CF6)','linear-gradient(135deg,#10B981,#38BDF8)','linear-gradient(135deg,#F59E0B,#EF4444)','linear-gradient(135deg,#A78BFA,#8B5CF6)','linear-gradient(135deg,#38BDF8,#10B981)'];

function buildStudentCard(st, idx){
  const achievs=DB.getAchievements().filter(a=>a.studentId===st.id&&a.status==='verified');
  const acRecs=DB.getStudentAcademic(st.id);
  const skills=DB.mapSkills(achievs);
  const readiness=DB.calcReadiness(st,DB.getAchievements(),DB.getAcademic());
  const avgMark=acRecs.length?Math.round(acRecs.reduce((s,r)=>s+r.marks,0)/acRecs.length):0;
  const avgAtd=acRecs.length?Math.round(acRecs.reduce((s,r)=>s+r.attendance,0)/acRecs.length):0;
  const isSaved=saved.includes(st.id);
  const initials2=st.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const g=GRADS[idx%GRADS.length];
  return`<div class="card animate-in" style="transition:transform 0.2s,box-shadow 0.2s;cursor:default" onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 16px 40px rgba(0,0,0,0.4)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
    <div style="display:flex;align-items:flex-start;gap:0.9rem;margin-bottom:0.8rem">
      <div class="avatar av-lg" style="background:${g}">${initials2}</div>
      <div style="flex:1">
        <div style="font-family:var(--font-h);font-size:0.95rem;font-weight:800">${st.name}</div>
        <div class="text-xs text-muted">${st.dept} · Year ${st.year} · GPA ${st.gpa}</div>
        <div style="margin-top:0.35rem;display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
          <div style="font-family:var(--font-h);font-size:1.2rem;font-weight:800;color:${readiness>=80?'var(--emerald)':readiness>=60?'var(--cyan)':'var(--amber)'}">${readiness}</div>
          <span class="text-xs text-muted">/100 Readiness</span>
          <span class="chip chip-emerald">${achievs.length} verified</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:0.35rem;align-items:flex-end">
        <button class="btn btn-sm ${isSaved?'btn-violet':'btn-secondary'}" onclick="toggleSave('${st.id}');renderDiscover()">${isSaved?'★ Saved':'☆ Save'}</button>
        <button class="btn btn-sm btn-primary" onclick="openProfile('${st.id}')">View Profile</button>
      </div>
    </div>
    <div style="display:flex;gap:1.5rem;margin-bottom:0.7rem;flex-wrap:wrap">
      ${[['Avg Marks',avgMark+'%',avgMark>=80?'var(--emerald)':avgMark>=60?'var(--cyan)':'var(--red)'],['Attendance',avgAtd+'%',avgAtd>=75?'var(--emerald)':'var(--red)'],['Achievements',achievs.length,'var(--violet)']].map(([l,v,c])=>`<div><div class="text-xs text-muted">${l}</div><div style="font-weight:700;font-size:0.85rem;color:${c}">${v}</div></div>`).join('')}
    </div>
    <div class="skill-tags">${skills.slice(0,8).map((s,i)=>`<span class="skill-tag ${['','violet','emerald','amber'][i%4]}">${s}</span>`).join('')||'<span class="text-xs text-muted">No verified skills yet</span>'}</div>
  </div>`;
}

// ══════════════════════════════════════════
// DISCOVER
// ══════════════════════════════════════════
let searchVal='',filterDept='all',filterMin=0;
function renderDiscover(){
  const students=DB.getStudents();
  const depts=[...new Set(students.map(s=>s.dept))];

  document.getElementById('mainArea').innerHTML=`
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>Discover Talent</h2><p>${students.length} verified student profiles</p></div></div>

  <!-- Filters -->
  <div class="card animate-in anim-delay-1" style="margin-bottom:1rem">
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center">
      <div class="search-wrap" style="flex:1;min-width:200px">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchFilter" placeholder="Search by name, skill, or achievement…" value="${searchVal}" oninput="searchVal=this.value;applyFilters()">
      </div>
      <select class="form-control" id="deptFilter" style="width:auto" onchange="filterDept=this.value;applyFilters()">
        <option value="all">All Departments</option>
        ${depts.map(d=>`<option value="${d}" ${filterDept===d?'selected':''}>${d}</option>`).join('')}
      </select>
      <select class="form-control" id="minScore" style="width:auto" onchange="filterMin=parseInt(this.value);applyFilters()">
        <option value="0">Any Readiness</option>
        <option value="70">70+</option><option value="80">80+</option><option value="90">90+</option>
      </select>
    </div>
  </div>

  <div id="studentGrid" style="display:flex;flex-direction:column;gap:0.75rem"></div>
  `;
  applyFilters();
  const sb=document.getElementById('savedBadge');
  if(saved.length){sb.style.display='flex';sb.textContent=saved.length;}else sb.style.display='none';
}

function applyFilters(){
  const students=DB.getStudents();
  const achievs=DB.getAchievements();
  const filtered=students.filter(st=>{
    const r=DB.calcReadiness(st,achievs,DB.getAcademic());
    const skills=DB.mapSkills(achievs.filter(a=>a.studentId===st.id)).join(' ').toLowerCase();
    const achs=achievs.filter(a=>a.studentId===st.id).map(a=>a.title).join(' ').toLowerCase();
    const matchSearch=!searchVal||st.name.toLowerCase().includes(searchVal.toLowerCase())||skills.includes(searchVal.toLowerCase())||achs.includes(searchVal.toLowerCase());
    const matchDept=filterDept==='all'||st.dept===filterDept;
    const matchScore=r>=filterMin;
    return matchSearch&&matchDept&&matchScore;
  });
  const grid=document.getElementById('studentGrid');
  if(!grid)return;
  if(!filtered.length){grid.innerHTML='<div class="card"><div class="empty-state"><div class="ico">🔍</div><p>No students match your filters.</p></div></div>';return;}
  grid.innerHTML=filtered.map((st,i)=>buildStudentCard(st,i)).join('');
}

// ══════════════════════════════════════════
// PROFILE MODAL
// ══════════════════════════════════════════
function openProfile(sid){
  const st=DB.getStudentById(sid);if(!st)return;
  const achievs=DB.getAchievements().filter(a=>a.studentId===sid&&a.status==='verified');
  const acRecs=DB.getStudentAcademic(sid);
  const skills=DB.mapSkills(achievs);
  const readiness=DB.calcReadiness(st,DB.getAchievements(),DB.getAcademic());
  const avgMark=acRecs.length?Math.round(acRecs.reduce((s,r)=>s+r.marks,0)/acRecs.length):0;
  const avgAtd=acRecs.length?Math.round(acRecs.reduce((s,r)=>s+r.attendance,0)/acRecs.length):0;
  const initials2=st.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  document.getElementById('pmTitle').textContent=`${st.name}'s Profile`;
  document.getElementById('pmBody').innerHTML=`
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem">
      <div class="avatar av-xl" style="background:linear-gradient(135deg,var(--cyan),var(--violet))">${initials2}</div>
      <div>
        <div style="font-family:var(--font-h);font-size:1.2rem;font-weight:800">${st.name}</div>
        <div class="text-xs text-muted">${st.dept} · Year ${st.year} · ${st.rollNo}</div>
        <div style="margin-top:0.5rem;display:flex;gap:0.5rem;align-items:center">
          <span style="font-family:var(--font-h);font-size:1.6rem;font-weight:800;color:${readiness>=80?'var(--emerald)':readiness>=60?'var(--cyan)':'var(--amber)'}">${readiness}</span>
          <span class="text-xs text-muted">/100 Industry Readiness</span>
        </div>
      </div>
    </div>
    <div class="grid-3" style="margin-bottom:1rem">
      ${[['GPA',st.gpa,'var(--cyan)'],['Avg Marks',avgMark+'%',avgMark>=80?'var(--emerald)':'var(--cyan)'],['Attendance',avgAtd+'%',avgAtd>=75?'var(--emerald)':'var(--red)']].map(([l,v,c])=>`<div style="text-align:center;padding:0.75rem;background:var(--s2);border-radius:9px;border:1px solid var(--b2)"><div class="text-xs text-muted">${l}</div><div style="font-family:var(--font-h);font-size:1.2rem;font-weight:800;color:${c}">${v}</div></div>`).join('')}
    </div>
    <div style="margin-bottom:1rem">
      <div class="card-title">🧠 Verified Skills</div>
      <div class="skill-tags">${skills.map((s,i)=>`<span class="skill-tag ${['','violet','emerald','amber'][i%4]}">${s}</span>`).join('')||'<span class="text-xs text-muted">None yet</span>'}</div>
    </div>
    <div style="margin-bottom:1rem">
      <div class="card-title">🏆 Verified Achievements (${achievs.length})</div>
      ${achievs.map(a=>`<div style="display:flex;align-items:flex-start;gap:0.65rem;padding:0.6rem 0;border-bottom:1px solid var(--b3)">
        <span class="status-verified" style="flex-shrink:0">✓</span>
        <div><div style="font-size:0.82rem;font-weight:600">${a.title}</div><div class="text-xs text-muted">${a.org||''} · ${a.date||''}</div><div class="skill-tags mt-1">${(a.skills||[]).map(s=>`<span class="skill-tag">${s}</span>`).join('')}</div></div>
      </div>`).join('')||'<div class="text-xs text-muted">No verified achievements</div>'}
    </div>
    ${acRecs.length?`<div>
      <div class="card-title">📚 Academic Snapshot</div>
      ${acRecs.map(r=>`<div style="display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--b3);font-size:0.78rem"><span style="color:var(--text2)">${r.subject}</span><span style="font-weight:600;color:${r.marks>=80?'var(--emerald)':r.marks>=60?'var(--cyan)':'var(--red)'}">${r.marks}%</span></div>`).join('')}
    </div>`:''}
    <div style="display:flex;gap:0.5rem;margin-top:1.2rem">
      <button class="btn btn-primary" style="flex:1" onclick="toast('Contact request sent!','The institution will forward your message.');document.getElementById('profileModal').classList.remove('open')">📧 Express Interest</button>
      <button class="btn ${saved.includes(st.id)?'btn-violet':'btn-secondary'}" onclick="toggleSave('${st.id}');openProfile('${st.id}')">${saved.includes(st.id)?'★ Saved':'☆ Save'}</button>
    </div>`;
  document.getElementById('profileModal').classList.add('open');
}
window.openProfile=openProfile;
document.getElementById('profileModal').addEventListener('click',e=>{if(e.target.id==='profileModal')document.getElementById('profileModal').classList.remove('open');});

// ══════════════════════════════════════════
// LEADERBOARD
// ══════════════════════════════════════════
function renderLeaderboard(){
  const students=DB.getStudents();
  const sorted=students.map(st=>({...st,readiness:DB.calcReadiness(st,DB.getAchievements(),DB.getAcademic()),verified:DB.getAchievements().filter(a=>a.studentId===st.id&&a.status==='verified').length})).sort((a,b)=>b.readiness-a.readiness);

  document.getElementById('mainArea').innerHTML=`
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>Talent Leaderboard</h2><p>Ranked by Industry Readiness Score</p></div></div>
  <div style="display:flex;flex-direction:column;gap:0.5rem">
    ${sorted.map((st,i)=>{
      const skills=DB.mapSkills(DB.getAchievements().filter(a=>a.studentId===st.id));
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      const g=GRADS[i%GRADS.length];
      const initials2=st.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      return`<div class="card animate-in" style="display:flex;align-items:center;gap:1rem;padding:0.9rem 1.1rem;transition:transform 0.2s" onmouseover="this.style.transform='translateX(4px)'" onmouseout="this.style.transform=''">
        <div style="font-family:var(--font-h);font-size:1.2rem;font-weight:800;color:var(--muted);width:30px;text-align:center">${medal||('#'+(i+1))}</div>
        <div class="avatar av-md" style="background:${g}">${initials2}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:0.88rem">${st.name} <span class="text-xs text-muted">${st.dept} Y${st.year}</span></div>
          <div class="skill-tags mt-1">${skills.slice(0,5).map((s,j)=>`<span class="skill-tag ${['','violet','emerald','amber'][j%4]}">${s}</span>`).join('')}</div>
        </div>
        <div style="display:flex;align-items:center;gap:1rem">
          <div style="text-align:center"><div style="font-family:var(--font-h);font-size:1.4rem;font-weight:800;color:${st.readiness>=80?'var(--emerald)':st.readiness>=60?'var(--cyan)':'var(--amber)'}">${st.readiness}</div><div class="text-xs text-muted">readiness</div></div>
          <div style="text-align:center"><div style="font-family:var(--font-h);font-size:1.1rem;font-weight:700;color:var(--violet)">${st.verified}</div><div class="text-xs text-muted">verified</div></div>
          <button class="btn btn-sm btn-primary" onclick="openProfile('${st.id}')">View</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ══════════════════════════════════════════
// SKILL MAP
// ══════════════════════════════════════════
function renderSkills(){
  const achievs=DB.getAchievements().filter(a=>a.status==='verified');
  const allSkills={};
  achievs.forEach(a=>(a.skills||[]).forEach(s=>{allSkills[s]=(allSkills[s]||0)+1;}));
  const sorted=Object.entries(allSkills).sort((a,b)=>b[1]-a[1]);

  document.getElementById('mainArea').innerHTML=`
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>Campus Skill Map</h2><p>Most common verified skills across all students</p></div></div>
  <div class="grid-2 animate-in anim-delay-1">
    <div class="card">
      <div class="card-title">🔥 Top Skills in Demand</div>
      ${sorted.slice(0,10).map(([skill,count],i)=>`<div style="margin-bottom:0.65rem">
        <div class="progress-label"><span style="font-size:0.78rem;color:var(--text2)">${skill}</span><span style="font-size:0.78rem;font-weight:700;color:var(--cyan)">${count} student${count>1?'s':''}</span></div>
        <div class="progress-wrap"><div class="progress-fill" data-w="${Math.round(count/sorted[0][1]*100)}%" data-bg="${['linear-gradient(90deg,var(--cyan),var(--violet))','linear-gradient(90deg,var(--emerald),var(--cyan))','linear-gradient(90deg,var(--amber),var(--emerald))','linear-gradient(90deg,var(--pink),var(--violet))'][i%4]}"></div></div>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">🧩 All Campus Skills</div>
      <div class="skill-tags" style="gap:0.4rem">${sorted.map(([s,c],i)=>`<span class="skill-tag ${['','violet','emerald','amber'][i%4]}" style="cursor:pointer;font-size:${0.65+Math.min(c*0.05,0.2)}rem" title="${c} students">${s} <span style="opacity:0.6">${c}</span></span>`).join('')||'<span class="text-xs text-muted">No verified skills yet</span>'}</div>
      <div class="divider"></div>
      <div class="text-xs text-muted">Sizes reflect frequency. Skills from verified achievements only.</div>
    </div>
  </div>`;
  document.querySelectorAll('.progress-fill[data-w]').forEach(e=>{setTimeout(()=>{e.style.width=e.dataset.w;e.style.background=e.dataset.bg;},100);});
}

// ══════════════════════════════════════════
// RESEARCH POOL
// ══════════════════════════════════════════
function renderResearch(){
  const research=DB.getResearch().filter(r=>r.status==='published');
  document.getElementById('mainArea').innerHTML=`
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>Research Pool</h2><p>${research.length} published papers from faculty</p></div></div>
  <div style="display:flex;flex-direction:column;gap:0.75rem">
    ${research.map(r=>{const t=DB.getTeachers().find(x=>x.id===r.teacherId);return`<div class="card animate-in">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap">
        <div style="flex:1">
          <div style="font-family:var(--font-h);font-size:0.9rem;font-weight:800;margin-bottom:0.3rem">${r.title}</div>
          <div class="text-xs text-muted">by ${t?.name||'Unknown'} · ${r.journal||'—'} · ${r.year}</div>
          ${r.doi?`<div class="text-xs" style="color:var(--cyan);margin-top:0.2rem">DOI: ${r.doi}</div>`:''}
          ${r.coAuthors?.length?`<div class="text-xs text-muted mt-1">Co-authors: ${r.coAuthors.join(', ')}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.3rem">
          <span class="status-verified">✓ Published</span>
          ${r.citations?`<span class="chip chip-cyan">📖 ${r.citations} citations</span>`:''}
        </div>
      </div>
    </div>`}).join('')||`<div class="card"><div class="empty-state"><div class="ico">📄</div><p>No published research yet.</p></div></div>`}
  </div>`;
}

// ══════════════════════════════════════════
// SAVED
// ══════════════════════════════════════════
function renderSaved(){
  const savedStudents=DB.getStudents().filter(s=>saved.includes(s.id));
  document.getElementById('mainArea').innerHTML=`
  <div class="page-hdr animate-in"><div class="page-hdr-left"><h2>Saved Profiles (${savedStudents.length})</h2></div></div>
  ${savedStudents.length?`<div style="display:flex;flex-direction:column;gap:0.75rem">${savedStudents.map((st,i)=>buildStudentCard(st,i)).join('')}</div>`:`<div class="card animate-in"><div class="empty-state"><div class="ico">★</div><p>No saved profiles yet. Browse talent and save profiles you're interested in.</p></div></div>`}`;
}
</script>
</body>
</html>
